    <!-- Firebase SDKs -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import { getAuth, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink,
               signOut, onAuthStateChanged, GoogleAuthProvider, signInWithRedirect,
               getRedirectResult, createUserWithEmailAndPassword, signInWithEmailAndPassword,
               sendPasswordResetEmail }
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
      import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection }
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCnv0S78A8kK9vHHrzQKfYbX6NWM1UXRhs",
        authDomain: "mon-planificateur-1e03c.firebaseapp.com",
        projectId: "mon-planificateur-1e03c",
        storageBucket: "mon-planificateur-1e03c.firebasestorage.app",
        messagingSenderId: "978579425049",
        appId: "1:978579425049:web:e53559ba2b80517c7c6788"
      };

      const app   = initializeApp(firebaseConfig);
      const auth  = getAuth(app);
      const db    = getFirestore(app);

      // ── Expose to window for vanilla scripts ──────────────────────────────
      const googleProvider = new GoogleAuthProvider();
      // Use redirect (works on Safari, iOS, all browsers — no popup needed)
      window._signInWithGoogle = () => signInWithRedirect(auth, googleProvider);

      window._fb = { auth, db, doc, setDoc, getDoc, onSnapshot, collection,
                     sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink,
                     signOut, onAuthStateChanged,
                     createUserWithEmailAndPassword, signInWithEmailAndPassword,
                     sendPasswordResetEmail };

      // ── Action URL for email link ─────────────────────────────────────────
      const ACTION_URL = 'https://mysinglelise.github.io/monplanificateur/';

      // ── Handle Google redirect result on page load ────────────────────────
      getRedirectResult(auth)
        .then(result => {
          if (result && result.user) {
            // Successfully signed in via Google redirect — onAuthStateChanged handles the rest
            console.log('✅ Google redirect sign-in:', result.user.email);
          }
        })
        .catch(e => {
          if (e.code !== 'auth/no-current-user') {
            console.error('Google redirect error:', e);
            // Show error on login screen if visible
            const errEl = document.getElementById('login-error');
            if (errEl) { errEl.textContent = 'Erreur Google : ' + e.message; errEl.style.display = 'block'; }
          }
        });

      // ── Handle email-link sign-in on page load ────────────────────────────
      if (isSignInWithEmailLink(auth, window.location.href)) {
        let email = window.localStorage.getItem('emailForSignIn');
        if (!email) email = window.prompt('Confirme ton adresse email :');
        signInWithEmailLink(auth, email, window.location.href)
          .then(() => {
            window.localStorage.removeItem('emailForSignIn');
            window.history.replaceState({}, document.title, ACTION_URL);
          })
          .catch(e => alert('Erreur de connexion : ' + e.message));
      }

      // ── Auth state → show/hide login overlay ─────────────────────────────
      onAuthStateChanged(auth, user => {
        window._currentUser = user;
        if (user) {
          document.getElementById('login-overlay').style.display = 'none';
          document.getElementById('app-container').style.display  = 'block';
          document.getElementById('user-email-display').textContent = user.email;
          window._initFirestoreSync(user.uid);
        } else {
          document.getElementById('login-overlay').style.display  = 'flex';
          document.getElementById('app-container').style.display  = 'none';
        }
      });

      // ── Send magic link ───────────────────────────────────────────────────
      window._sendMagicLink = async (email) => {
        const actionCodeSettings = { url: ACTION_URL, handleCodeInApp: true };
        await sendSignInLinkToEmail(auth, email, actionCodeSettings);
        window.localStorage.setItem('emailForSignIn', email);
      };

      window._signOut = () => signOut(auth);
    </script>

    <!-- ═══════════ Firestore Sync Engine ═══════════ -->
    <script>
    // ── Debounce helper ───────────────────────────────────────────────────────
    function debounce(fn, ms) {
        let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
    }

    // ── Sync indicator ────────────────────────────────────────────────────────
    function setSyncing(v) {
        const el = document.getElementById('sync-indicator');
        if (!el) return;
        el.textContent = v ? '⟳' : '●';
        el.style.color  = v ? '#f59e0b' : '#22c55e';
        el.title        = v ? 'Synchronisation...' : 'Synchronisé';
    }

    // ── Keys we sync to Firestore ─────────────────────────────────────────────
    const SYNC_KEYS = ['plannerEvents','plannerTodos','customWeekData',
                       'cycleData','interData','postits','coursesData','modulesConfig','membresData'];

    // ── Firestore document ref for current user ───────────────────────────────
    function userDocRef(uid) {
        const { db, doc } = window._fb;
        return doc(db, 'users', uid);
    }

    // ── Save ALL local state to Firestore (debounced 800ms) ───────────────────
    window._pushToFirestore = debounce(async (uid) => {
        setSyncing(true);
        const data = {};
        SYNC_KEYS.forEach(k => {
            const v = localStorage.getItem(k);
            if (v) data[k] = v;
        });
        try {
            const { setDoc } = window._fb;
            await setDoc(userDocRef(uid), data, { merge: true });
        } catch(e) { console.error('Firestore write error:', e); }
        setSyncing(false);
    }, 800);

    window._pushToFirestore = _pushToFirestore;

    // ── On login: load from Firestore, then start real-time listener ─────────
    window._initFirestoreSync = async (uid) => {
        const { getDoc, onSnapshot } = window._fb;
        // 1. Load initial data
        try {
            const snap = await getDoc(userDocRef(uid));
            if (snap.exists()) {
                const data = snap.data();
                SYNC_KEYS.forEach(k => { if (data[k]) localStorage.setItem(k, data[k]); });
                // Reload UI with fresh data
                window._reloadAllUI && window._reloadAllUI();
            }
        } catch(e) { console.error('Firestore read error:', e); }

        // 2. Real-time listener for multi-device sync
        onSnapshot(userDocRef(uid), (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            let changed = false;
            SYNC_KEYS.forEach(k => {
                if (data[k] && data[k] !== localStorage.getItem(k)) {
                    localStorage.setItem(k, data[k]);
                    changed = true;
                }
            });
            if (changed) {
                window._reloadAllUI && window._reloadAllUI();
            }
        });
    };

    // ── Monkey-patch localStorage.setItem to auto-push ───────────────────────
    const _origSetItem = localStorage.setItem.bind(localStorage);
    localStorage.setItem = function(key, value) {
        _origSetItem(key, value);
        if (SYNC_KEYS.includes(key) && window._currentUser) {
            window._pushToFirestore(window._currentUser.uid);
        }
    };

    window._showTab = (tab) => {

            errEl.textContent = msgs[e.code] || 'Erreur : ' + e.message;
            errEl.style.display = 'block';
        }

    window._doPasswordRegister = async () => {
        const email    = document.getElementById('pw-email').value.trim();
        const password = document.getElementById('pw-password').value;
        const errEl    = document.getElementById('login-error');
        errEl.style.display = 'none';

        if (password.length < 6) { errEl.textContent = 'Le mot de passe doit faire au moins 6 caractères.'; errEl.style.display = 'block'; return; }
        try {
            const { createUserWithEmailAndPassword, auth } = window._fb;

            const msgs = {

                'auth/weak-password':        'Mot de passe trop faible (6 caractères minimum).',

    // ── Reload all vanilla-JS UIs after Firestore sync ───────────────────────
    window._reloadAllUI = () => {

        // Intermittence

            window.interData = interData;
        } catch(e) {}
        // React (events + todos + customWeekData) — trigger re-render
        try { window._reactReload && window._reactReload(); } catch(e) {}
    };

        const getWeekOfMonth = (date) => {
            const firstDay = new Date(date.getFullYear(), date.getMonth(), 1);
            const dayOfMonth = date.getDate();
            const firstDayOfWeek = firstDay.getDay();
            return Math.ceil((dayOfMonth + firstDayOfWeek) / 7);
        };

        const getDaysInMonth = (year, month) => {
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startingDayOfWeek = firstDay.getDay();
            
            const days = [];
            const prevMonthLastDay = new Date(year, month, 0).getDate();
            for (let i = startingDayOfWeek - 1; i >= 0; i--) {
                days.push({
                    day: prevMonthLastDay - i,
                    isCurrentMonth: false,
                    date: new Date(year, month - 1, prevMonthLastDay - i)
                });
            }
            
            for (let i = 1; i <= daysInMonth; i++) {
                days.push({
                    day: i,
                    isCurrentMonth: true,
                    date: new Date(year, month, i)
                });
            }
            
            const remainingDays = 42 - days.length;
            for (let i = 1; i <= remainingDays; i++) {
                days.push({
                    day: i,
                    isCurrentMonth: false,
                    date: new Date(year, month + 1, i)
                });
            }
            
            return days;
        };

                        created: new Date().toISOString()

                newTodos[dateStr] = newTodos[dateStr].filter(t => t.completed);

                                                        })()}
                                                    `}
                                                >
                                                    {(() => {
                                                        if (!dayInfo.isCurrentMonth) return dayInfo.day;
                                                        const dateStr = formatDate(dayInfo.date);
                                                        const ovulation = window.cycleHelper?.getOvulation?.();
                                                        const isOvulation = ovulation && dateStr === formatDate(ovulation);
                                                        if (isOvulation) return '🥚';
                                                        return dayInfo.day;
                                                    })()}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                );

    <script>
        // Données post-its
        let postits = JSON.parse(localStorage.getItem('postits') || '[]');
        const colors = [
            { bg: '#FEF3C7', border: '#FCD34D', text: '#92400E' },
            { bg: '#DBEAFE', border: '#93C5FD', text: '#1E3A8A' },
            { bg: '#FCE7F3', border: '#F9A8D4', text: '#831843' },
            { bg: '#D1FAE5', border: '#6EE7B7', text: '#065F46' }
        ];

        function savePostits() {
            localStorage.setItem('postits', JSON.stringify(postits));
        }

        function addPostit() {
            if (postits.length >= 4) return alert('Maximum 4 post-its !');
            const color = colors[postits.length];
            postits.push({ id: Date.now(), title: '', content: '', color });
            savePostits();
            renderPostits();
        }

        function updatePostit(id, field, value) {
            const postit = postits.find(p => p.id === id);
            if (postit) {
                postit[field] = value;
                savePostits();
            }
        }

        function deletePostit(id) {
            if (confirm('Supprimer ce post-it ?')) {
                postits = postits.filter(p => p.id !== id);
                savePostits();
                renderPostits();
            }
        }

        function renderPostits() {
            const container = document.getElementById('postit-container');
            if (postits.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #94A3B8; font-size: 12px; font-style: italic; padding: 20px;">Clique sur + pour créer un post-it !</p>';
                return;
            }
            
            container.innerHTML = postits.map(p => `
                <div class="postit-item" style="background: ${p.color.bg}; border-color: ${p.color.border}; color: ${p.color.text};">
                    <input 
                        type="text" 
                        placeholder="Titre..." 
                        value="${p.title}"
                        onchange="updatePostit(${p.id}, 'title', this.value)"
                    />
                    <textarea 
                        placeholder="Contenu..."
                        onchange="updatePostit(${p.id}, 'content', this.value)"
                    >${p.content}</textarea>
                    <button 
                        onclick="deletePostit(${p.id})"
                        style="background: none; border: none; color: #DC2626; cursor: pointer; font-size: 11px; margin-top: 4px;"
                    >🗑️ Supprimer</button>
                </div>
            `).join('');
        }

        // Charger au démarrage
        renderPostits();
// Toggle post-its
function togglePostits() {
    const widget = document.getElementById('postit-widget');
    widget.classList.toggle('hidden');
}
    </script>




    <!-- Script Courses -->
    <script>
        let coursesData = JSON.parse(localStorage.getItem('coursesData') || '[]');
        // Structure: [{ id, name, items: [{ id, text, checked }] }]

        function saveCoursesData() {
            localStorage.setItem('coursesData', JSON.stringify(coursesData));
        }

        function toggleCoursesPanel() {
            const panel = document.getElementById('courses-panel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }

        function addCoursesStore() {
            coursesData.push({ id: Date.now(), name: 'Nouveau magasin', items: [] });
            saveCoursesData();
            renderCourses();
        }

        function deleteCoursesStore(storeId) {
            if (confirm('Supprimer ce magasin ?')) {
                coursesData = coursesData.filter(s => s.id !== storeId);
                saveCoursesData();
                renderCourses();
            }
        }

        function updateStoreName(storeId, name) {
            const store = coursesData.find(s => s.id === storeId);
            if (store) { store.name = name; saveCoursesData(); }
        }

        function addItem(storeId) {
            const store = coursesData.find(s => s.id === storeId);
            if (!store) return;
            const input = document.getElementById('new-item-' + storeId);
            const text = input ? input.value.trim() : '';
            if (!text) return;
            store.items.push({ id: Date.now(), text, checked: false });
            saveCoursesData();
            renderCourses();
        }

        function toggleItem(storeId, itemId) {
            const store = coursesData.find(s => s.id === storeId);
            if (!store) return;
            const item = store.items.find(i => i.id === itemId);
            if (item) { item.checked = !item.checked; saveCoursesData(); renderCourses(); }
        }

        function deleteItem(storeId, itemId) {
            const store = coursesData.find(s => s.id === storeId);
            if (!store) return;
            store.items = store.items.filter(i => i.id !== itemId);
            saveCoursesData();
            renderCourses();
        }

        function uncheckAll(storeId) {
            const store = coursesData.find(s => s.id === storeId);
            if (!store) return;
            store.items.forEach(i => i.checked = false);
            saveCoursesData();
            renderCourses();
        }

        function renderCourses() {
            const container = document.getElementById('courses-container');
            if (!container) return;

            if (coursesData.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#94A3B8;font-size:13px;font-style:italic;padding:20px;">Clique sur + Magasin pour commencer !</p>';
                return;
            }

            const storeColors = ['#f0fdf4','#eff6ff','#fef9ec','#fdf4ff'];
            const borderColors = ['#86efac','#93c5fd','#fcd34d','#d8b4fe'];

            container.innerHTML = coursesData.map((store, si) => {
                const bg = storeColors[si % storeColors.length];
                const border = borderColors[si % borderColors.length];
                const checked = store.items.filter(i => i.checked).length;
                const total = store.items.length;

                const itemsHtml = store.items.map(item => `
                    <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f1f5f9;">
                        <input type="checkbox" ${item.checked ? 'checked' : ''} 
                            onchange="toggleItem(${store.id}, ${item.id})"
                            style="width:16px;height:16px;cursor:pointer;accent-color:#47ed79;flex-shrink:0;" />
                        <span style="flex:1;font-size:13px;${item.checked ? 'text-decoration:line-through;color:#94a3b8;' : 'color:#1e293b;'}">${item.text}</span>
                        <button onclick="deleteItem(${store.id}, ${item.id})"

    <!-- Script Cycle & Lunes -->
    <script>
        // Données cycle
        let cycleData = JSON.parse(localStorage.getItem('cycleData') || '[]');
        window.cycleData = cycleData;
        
        // Calculs lunaires
        function getMoonPhase(date) {
    const knownNewMoon = new Date('2025-01-29T12:36:00Z');
    const lunarCycle = 29.53059;
    const diff = (date - knownNewMoon) / (1000 * 60 * 60 * 24);
    const phase = ((diff % lunarCycle) + lunarCycle) % lunarCycle;
    // Plus précis : ±0.5 jour au lieu de ±1.5
    if (phase < 0.5 || phase > 29) return 'new';
    if (phase > 14 && phase < 15) return 'full';
    return null;
}
        
        function isNewMoon(date) { return getMoonPhase(date) === 'new'; }
        function isFullMoon(date) { return getMoonPhase(date) === 'full'; }
        
        // Calculs cycle
        function getCycles() {
            if (cycleData.length === 0) return [];
            const periods = [];
            let current = [];
            cycleData.forEach((day) => {
                if (current.length === 0) {
                    current.push(day);
                } else {
                    const lastDate = new Date(current[current.length - 1].date);
                    const thisDate = new Date(day.date);
                    const diff = (thisDate - lastDate) / (1000 * 60 * 60 * 24);
                    if (diff <= 1) current.push(day);
                    else { periods.push([...current]); current = [day]; }
                }
            });
            if (current.length > 0) periods.push(current);
            return periods;
        }
        
        function getLastPeriod() { const periods = getCycles(); return periods.length > 0 ? periods[periods.length - 1] : null; }
        
        function getCycleLength() {
            const periods = getCycles();
            if (periods.length < 2) return 29;
            let total = 0;
            for (let i = 1; i < periods.length; i++) {
                const d1 = new Date(periods[i-1][0].date);
                const d2 = new Date(periods[i][0].date);
                total += (d2 - d1) / (1000 * 60 * 60 * 24);
            }
            return Math.round(total / (periods.length - 1));
        }
        
        function getPredictedOvulation() { const last = getLastPeriod(); if (!last) return null; const d = new Date(last[0].date); d.setDate(d.getDate() + 13); return d; }
        function getPredictedNextPeriod() { const last = getLastPeriod(); if (!last) return null; const d = new Date(last[0].date); d.setDate(d.getDate() + getCycleLength()); return d; }
        function isFertileWindow(date) { const last = getLastPeriod(); if (!last) return false; const start = new Date(last[0].date); start.setDate(start.getDate() + 8); const end = new Date(last[0].date); end.setDate(end.getDate() + 14); return date >= start && date <= end; }
        
        // Gestion données
        function addCycleDay(dateStr, flow, cramps) {
            const existing = cycleData.findIndex(d => d.date === dateStr);
            if (existing >= 0) {
                cycleData[existing].flow = flow;
                cycleData[existing].cramps = cramps || false;
            } else { 
                cycleData.push({ date: dateStr, flow: flow, cramps: cramps || false }); 
                cycleData.sort((a, b) => new Date(a.date) - new Date(b.date)); 
            }
            localStorage.setItem('cycleData', JSON.stringify(cycleData));
            window.cycleData = cycleData;
            updateCycleStats();
        }
        
        function removeCycleDay(dateStr) {
            cycleData = cycleData.filter(d => d.date !== dateStr);
            localStorage.setItem('cycleData', JSON.stringify(cycleData));
            window.cycleData = cycleData;
            updateCycleStats();
        }
        
        function getCycleDay(dateStr) { return cycleData.find(d => d.date === dateStr); }
        
        // Panneau de stats
        function toggleCyclePanel() {
            const panel = document.getElementById('cycle-panel');
            if (panel.style.display === 'none') { panel.style.display = 'block'; updateCycleStats(); }
            else panel.style.display = 'none';
        }
        
        function updateCycleStats() {
            const stats = document.getElementById('cycle-stats');
            const lastPeriod = getLastPeriod();
            if (!lastPeriod) { stats.innerHTML = '<p>Aucune donnée.</p><p style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #ddd; font-size: 12px; font-style: italic;">💡 Clic droit en vue Mois</p>'; return; }
            const cycleLength = getCycleLength();
            const lastDate = new Date(lastPeriod[0].date).toLocaleDateString('fr-FR');
            const nextPeriod = getPredictedNextPeriod();
            const ovulation = getPredictedOvulation();
            let html = '<div style="line-height: 1.8;">';
            html += `<div style="display: flex; justify-content: space-between; margin-bottom: 8px;"><span style="color: #666;">Cycle moyen :</span><strong>${cycleLength} jours</strong></div>`;
            html += `<div style="display: flex; justify-content: space-between; margin-bottom: 8px;"><span style="color: #666;">Dernières règles :</span><strong>${lastDate}</strong></div>`;
            if (nextPeriod) html += `<div style="display: flex; justify-content: space-between; margin-bottom: 8px;"><span style="color: #666;">Prochaines prévues :</span><strong style="color: #EC4899;">${nextPeriod.toLocaleDateString('fr-FR')}</strong></div>`;
            if (ovulation) html += `<div style="display: flex; justify-content: space-between; margin-bottom: 8px;"><span style="color: #666;">Ovulation prévue :</span><strong>🥚 ${ovulation.toLocaleDateString('fr-FR')}</strong></div>`;
            html += '<div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #ddd; font-size: 12px; color: #666; font-style: italic;">💡 Clic droit en vue Mois</div></div>';
            stats.innerHTML = html;
        }
        
        // Exposer à React
        window.cycleHelper = { add: addCycleDay, remove: removeCycleDay, get: getCycleDay, getOvulation: getPredictedOvulation, getNextPeriod: getPredictedNextPeriod, isFertile: isFertileWindow };
        window.moonHelper = { isNew: isNewMoon, isFull: isFullMoon };
    </script>


    <!-- Script Intermittence -->
    <script>
        let interData = JSON.parse(localStorage.getItem('interData') || '{"birthdate":"12-13","events":{}}');
        window.interData = interData;
        
        function toggleIntermittencePanel() {
            const panel = document.getElementById('intermittence-panel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            if (panel.style.display === 'block') updateInterStats();
        }
        
        function saveInter() {
            localStorage.setItem('interData', JSON.stringify(interData));
            window.interData = interData;
        }
        
        function getPeriod() {
            const [m, d] = interData.birthdate.split('-').map(Number);
            const today = new Date();
            let y = today.getFullYear();
            let start = new Date(y, m-1, d);
            if (today < start) { y--; start = new Date(y, m-1, d); }
            return { start, end: new Date(y+1, m-1, d) };
        }
        
        function countCachets() {
            const p = getPeriod();
            let c = 0, o = 0;
            Object.entries(interData.events).forEach(([eventId, data]) => {
                const d = new Date(data.date);
                if (d >= p.start && d < p.end && data.counted) {
                    if (data.type === 'cachet') c++;
                    if (data.type === 'option') o++;
                }
            });
            return { cachets: c, options: o, total: c + o };
        }
        
       function updateInterStats() {
    const el = document.getElementById('intermittence-stats');
    const p = getPeriod();
    const cnt = countCachets();
    const days = Math.ceil((p.end - new Date()) / 86400000);
    
    // Calcul des deux restes
    const resteSur = Math.max(0, 43 - cnt.cachets);
    const resteOptimiste = Math.max(0, 43 - (cnt.cachets + cnt.options));
    
    el.innerHTML = `
        <div style="line-height:2">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
                <span style="font-size:12px;color:#666">Période: ${p.start.toLocaleDateString('fr')} → ${p.end.toLocaleDateString('fr')}</span>
                <button onclick="editBD()" style="background:none;border:none;cursor:pointer;font-size:16px">✏️</button>
            </div>
            <div style="border-top:1px solid #ddd;padding-top:10px;margin-bottom:10px"></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span>💊 Cachets effectués:</span><strong>${cnt.cachets} / 43</strong></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span>🤞🏼 Options prévues:</span><strong>${cnt.options}</strong></div>
            
            <div style="border-top:2px solid #8B5CF6;padding-top:8px;margin:8px 0"></div>
            
            <div style="display:flex;justify-content:space-between;margin-bottom:4px;color:#666;font-size:14px;font-weight:bold;">
                <span>Reste SÛR:</span><span>${resteSur} cachets</span>
            </div>
            <div style="display:flex;justify-content:space-between;margin-bottom:12px;color:#666;font-size:14px;font-weight:bold;">
                <span>Reste OPTIMISTE:</span><span>${resteOptimiste} cachets</span>
            </div>

            <div style="border-top:1px solid #ddd;padding-top:10px"></div>
            <div style="display:flex;justify-content:space-between;color:#666;font-size:13px"><span>Jours restants:</span><span>${days} jours</span></div>
        </div>
    `;
}
        
        function editBD() {
            const n = prompt('Date anniversaire (MM-JJ, ex: 12-13):', interData.birthdate);
            if (n && /^\d{1,2}-\d{1,2}$/.test(n)) {
                interData.birthdate = n;
                saveInter();
                updateInterStats();
            }
        }
        
        window.interHelper = {
            add: (eventId, dateStr, type) => { 
                interData.events[eventId] = { type, counted: true, date: dateStr }; 
                saveInter(); 
            },
            remove: (eventId) => { 
                delete interData.events[eventId]; 
                saveInter(); 
            },
            toggle: (eventId) => { 
                if (interData.events[eventId]) {
                    interData.events[eventId].counted = !interData.events[eventId].counted;
                    saveInter();
                    return interData.events[eventId].counted;
                }
                return false;
            },
            get: (eventId) => interData.events[eventId] || null
        };

    // ── Export all data as JSON file ─────────────────────────────────────────
    window._exportData = () => {
        const data = {};
        ['plannerEvents','plannerTodos','customWeekData','cycleData','interData','postits','coursesData']
            .forEach(k => { const v = localStorage.getItem(k); if (v) data[k] = JSON.parse(v); });
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = 'planificateur-backup-' + new Date().toISOString().slice(0,10) + '.json';
        a.click();
        URL.revokeObjectURL(url);
    };

    // ── Import data from JSON file ────────────────────────────────────────────
    window._importData = () => {
        const input = document.createElement('input');
        input.type  = 'file';
        input.accept = '.json';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    Object.entries(data).forEach(([k, v]) => localStorage.setItem(k, JSON.stringify(v)));
                    window._reloadAllUI && window._reloadAllUI();
                    alert('✅ Données importées avec succès !');
                } catch(e) { alert('❌ Fichier invalide : ' + e.message); }
            };
            reader.readAsText(file);
        };
        input.click();
    };

    </script>

    <script>
    // Couleur sélectionnée par défaut
    let selectedMembreColor = '#22c55e';

    // Charger depuis localStorage
    let membresData = JSON.parse(localStorage.getItem('membresData') || '[]');
    // Format : [{ nom: "Kim", color: "#22c55e" }, ...]

    function toggleMembresPanel() {
        const panel = document.getElementById('membres-panel');
        if (panel.style.display === 'none') {
            renderMembresList();
            panel.style.display = 'block';
        } else {
            panel.style.display = 'none';
        }
    }

    function selectMembreColor(color) {
        selectedMembreColor = color;
        // Highlight selected
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.style.border = btn.dataset.color === color
                ? '3px solid #1e293b'
                : '3px solid transparent';
        });
    }

    function addMembre() {
        const input = document.getElementById('membre-nom-input');
        const nom = input.value.trim();
        if (!nom) return;
        // Check duplicate
        if (membresData.some(m => m.nom.toLowerCase() === nom.toLowerCase())) {
            input.style.borderColor = '#ef4444';
            setTimeout(() => input.style.borderColor = '#e2e8f0', 1500);
            return;
        }
        membresData.push({ nom: nom, color: selectedMembreColor });
        localStorage.setItem('membresData', JSON.stringify(membresData));
        window.membresData = membresData;
        input.value = '';
        renderMembresList();
    }

    function deleteMembre(nom) {
        membresData = membresData.filter(m => m.nom !== nom);
        localStorage.setItem('membresData', JSON.stringify(membresData));
        window.membresData = membresData;
        renderMembresList();
    }

    function renderMembresList() {
        const list = document.getElementById('membres-list');
        if (!list) return;
        if (membresData.length === 0) {
            list.innerHTML = '<p style="color:#94a3b8; font-size:13px; font-style:italic;">Aucun membre. Ajoute un prénom ci-dessous.</p>';
            return;
        }
        list.innerHTML = membresData.map(m => `
            <div style="display:flex; align-items:center; gap:8px; padding:7px 10px;
                background:#f8fafc; border-radius:8px; margin-bottom:6px;">
                <div style="width:18px; height:18px; border-radius:50%; background:${m.color}; flex-shrink:0;"></div>
                <span style="flex:1; font-size:14px; font-weight:600; color:#334155;">${m.nom}</span>
                <button onclick="deleteMembre('${m.nom}')"
                    style="background:none; border:none; color:#cbd5e1; font-size:18px; cursor:pointer;
                           line-height:1; padding:0 2px;"
                    onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='#cbd5e1'">×</button>
            </div>
        `).join('');
    }

    // Expose globally for React
    window.membresData = membresData;

    // Function used by React to get member color for an event text
    window.getMemberColor = function(text) {
        if (!window.membresData || window.membresData.length === 0) return null;
        const lower = text.toLowerCase();
        for (const m of window.membresData) {
            if (lower.includes(m.nom.toLowerCase())) {
                return m.color;
            }
        }
        return null;
    };

    // Init on load
    window.addEventListener('load', () => {
        membresData = JSON.parse(localStorage.getItem('membresData') || '[]');
        window.membresData = membresData;
        // Select first color by default
        selectMembreColor('#22c55e');
    });
    </script>

    <!-- ═══════ Script Modules ═══════ -->
    <script>
    // Modules par défaut : tous activés
    const DEFAULT_MODULES = { cycle: true, inter: true, courses: true, postits: true, membres: true };
    let modulesConfig = JSON.parse(localStorage.getItem('modulesConfig') || JSON.stringify(DEFAULT_MODULES));

    function toggleModulesPanel() {
        const panel = document.getElementById('modules-panel');
        if (panel.style.display === 'none') {
            // Sync checkboxes with current config before showing
            document.getElementById('mod-cycle').checked   = modulesConfig.cycle;
            document.getElementById('mod-inter').checked   = modulesConfig.inter;
            document.getElementById('mod-courses').checked = modulesConfig.courses;
            document.getElementById('mod-postits').checked = modulesConfig.postits;
            document.getElementById('mod-membres').checked = modulesConfig.membres !== false;
            panel.style.display = 'block';
        } else {
            panel.style.display = 'none';
        }
    }

    // Montre/cache uniquement les boutons toggle (pas les panneaux)
    function setModuleVisible(module, visible) {
        const toggleIds = {
            cycle:   'cycle-toggle',
            inter:   'intermittence-toggle',
            courses: 'courses-toggle',
            postits: 'postit-toggle',
            membres: 'membres-toggle',
        };
        // Panneaux à FERMER si on désactive le module
        const panelIds = {
            cycle:   'cycle-panel',
            inter:   'intermittence-panel',
            courses: 'courses-panel',
            postits: 'postit-widget',
            membres: 'membres-panel',
        };
        const toggleEl = document.getElementById(toggleIds[module]);
        const panelEl  = document.getElementById(panelIds[module]);
        if (toggleEl) toggleEl.style.display = visible ? '' : 'none';
        // Si on désactive, on ferme aussi le panneau
        if (!visible && panelEl) panelEl.style.display = 'none';
        // Si on active, on laisse le panneau fermé (display:none) — l'utilisateur l'ouvre elle-même
    }

    function applyModules() {
        modulesConfig = {
            cycle:   document.getElementById('mod-cycle').checked,
            inter:   document.getElementById('mod-inter').checked,
            courses: document.getElementById('mod-courses').checked,
            postits: document.getElementById('mod-postits').checked,
            membres: document.getElementById('mod-membres').checked,
        };
        localStorage.setItem('modulesConfig', JSON.stringify(modulesConfig));
        Object.keys(modulesConfig).forEach(k => setModuleVisible(k, modulesConfig[k]));
    }

    // Appliquer au chargement
    function initModules() {
        modulesConfig = JSON.parse(localStorage.getItem('modulesConfig') || JSON.stringify(DEFAULT_MODULES));
        Object.keys(modulesConfig).forEach(k => {
            if (!modulesConfig[k]) setModuleVisible(k, false);
        });
    }

    // Lancer après le chargement complet
    window.addEventListener('load', () => setTimeout(initModules, 300));
    </script>
