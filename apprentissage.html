<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Univers de connaissance</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#060810;color:#e8e9f0;font-family:system-ui,sans-serif;height:100vh;overflow:hidden;}

header{position:fixed;top:0;left:0;right:0;z-index:200;height:48px;background:rgba(6,8,16,0.88);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding:0 16px;gap:10px;}
.nav-btn{padding:4px 13px;border-radius:14px;border:none;background:none;color:#6b7089;font-size:12px;cursor:pointer;font-family:system-ui;}
.nav-btn.on{background:rgba(255,255,255,0.08);color:#e8e9f0;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.search-wrap{position:relative;}
.search-wrap input{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:5px 12px 5px 30px;color:#e8e9f0;font-size:12px;font-family:system-ui;outline:none;width:150px;transition:all .2s;}
.search-wrap input:focus{width:210px;border-color:rgba(255,255,255,0.18);}
.s-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;color:#6b7089;pointer-events:none;}
a.retour{font-size:11px;color:#6b7089;text-decoration:none;border:1px solid rgba(255,255,255,0.07);padding:4px 9px;border-radius:6px;}

#cv-wrap{position:fixed;inset:0;top:48px;}
#cv{width:100%;height:100%;display:block;}

/* PANNEAU */
#panel{position:fixed;top:48px;right:0;bottom:0;width:320px;background:rgba(7,9,18,0.97);border-left:1px solid rgba(255,255,255,0.08);transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:150;display:flex;flex-direction:column;}
#panel.open{transform:translateX(0);}
.ph{padding:15px 16px 11px;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;}
.ph-close{background:none;border:none;color:#6b7089;cursor:pointer;font-size:17px;float:right;}
.ph-name{font-size:17px;font-weight:600;margin-bottom:2px;}
.ph-sub{font-size:11px;color:#6b7089;}
.pb{flex:1;overflow-y:auto;padding:13px 14px;}
.psec{margin-bottom:18px;}
.slabel{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#6b7089;margin-bottom:8px;}

.cc{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .18s;}
.cc:hover{border-color:rgba(255,255,255,0.16);background:rgba(255,255,255,0.07);}
.cc-t{font-size:13px;font-weight:500;margin-bottom:3px;}
.cc-m{font-size:11px;color:#6b7089;display:flex;gap:6px;align-items:center;}
.st{font-size:10px;padding:2px 7px;border-radius:7px;}
.st.en-cours{background:rgba(167,139,250,.18);color:#a78bfa;}
.st.pause{background:rgba(251,146,60,.18);color:#fb923c;}
.st.termine{background:rgba(52,211,153,.18);color:#34d399;}

.ec{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:7px;padding:9px 11px;margin-bottom:5px;}
.ec-t{font-size:12px;line-height:1.5;margin-bottom:4px;}
.ec-m{font-size:10px;color:#6b7089;display:flex;gap:6px;align-items:center;}
.ec-m a{color:#a78bfa;text-decoration:none;}
.ec-m button{background:none;border:none;cursor:pointer;color:#6b7089;font-size:10px;margin-left:auto;font-family:system-ui;}

.add-s{width:100%;padding:7px;background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.1);border-radius:6px;color:#6b7089;font-size:11px;cursor:pointer;font-family:system-ui;transition:all .18s;margin-top:3px;}
.add-s:hover{border-color:var(--pc,#a78bfa);color:var(--pc,#a78bfa);}

/* VUE TEXTE */
#view-texte{position:fixed;inset:0;top:48px;overflow-y:auto;padding:24px;display:none;z-index:100;}
.tv-title{font-size:20px;font-weight:600;margin-bottom:20px;color:#e8e9f0;}
.gal-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;margin-bottom:32px;}
.gal-card{background:#0d0f1e;border:1px solid rgba(255,255,255,0.08);border-radius:13px;padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.gal-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gc);}
.gal-card:hover{border-color:rgba(255,255,255,0.16);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.gal-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.gal-card-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.gal-card-name{font-size:15px;font-weight:600;}
.gal-card-counts{font-size:12px;color:#6b7089;margin-bottom:10px;}
.gal-card-planets{display:flex;flex-wrap:wrap;gap:5px;}
.gal-card-planet{font-size:11px;padding:3px 9px;border-radius:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);color:#a0a0b8;}

/* VUE COURS */
#view-cours{position:fixed;inset:0;top:48px;overflow-y:auto;padding:22px;display:none;z-index:150;background:#060810;}
.cback{background:none;border:none;color:#6b7089;cursor:pointer;font-size:12px;margin-bottom:16px;display:flex;align-items:center;gap:4px;font-family:system-ui;}
.cdt{font-size:22px;font-weight:600;margin-bottom:7px;}
.cdm{display:flex;gap:9px;align-items:center;flex-wrap:wrap;font-size:12px;color:#6b7089;margin-bottom:18px;}
.lchip{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 11px;border:1px solid rgba(255,255,255,0.09);border-radius:14px;color:#e8e9f0;text-decoration:none;margin:3px;background:rgba(255,255,255,0.04);}
.lchip:hover{border-color:#a78bfa;color:#a78bfa;}
.si{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:9px;margin-bottom:8px;overflow:hidden;}
.sh{padding:11px 13px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.sh:hover{background:rgba(255,255,255,0.03);}
.sd{font-size:13px;font-weight:500;}
.sp{font-size:11px;color:#6b7089;margin-top:2px;}
.sb{max-height:0;overflow:hidden;transition:max-height .3s ease;}
.sb.open{max-height:600px;}
.sb-in{padding:0 13px 13px;}
.sn{font-size:13px;line-height:1.7;white-space:pre-wrap;margin-bottom:9px;color:#c0c1d0;}
.rchips{display:flex;flex-wrap:wrap;gap:5px;}
.rchip{font-size:11px;padding:3px 9px;border:1px solid rgba(255,255,255,0.08);border-radius:13px;color:#e8e9f0;text-decoration:none;}
.rchip:hover{border-color:#a78bfa;}
.export-btn{padding:7px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:7px;color:#a78bfa;font-size:12px;cursor:pointer;font-family:system-ui;}

/* RECHERCHE */
#sr{position:fixed;top:52px;left:50%;transform:translateX(-50%);width:480px;max-width:94vw;background:rgba(7,9,20,0.98);border:1px solid rgba(255,255,255,0.1);border-radius:11px;max-height:58vh;overflow-y:auto;z-index:400;display:none;box-shadow:0 10px 36px rgba(0,0,0,.6);}
.sri{padding:10px 15px;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:background .12s;}
.sri:hover{background:rgba(255,255,255,0.05);}
.sri:last-child{border-bottom:none;}
.srt{font-size:10px;color:#6b7089;margin-bottom:2px;}
.srx{font-size:13px;}
.srg{font-size:11px;color:#6b7089;margin-top:2px;}

/* FAB */
#fab{position:fixed;bottom:20px;right:20px;z-index:250;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#f0abfc);border:none;cursor:pointer;font-size:21px;color:white;box-shadow:0 4px 14px rgba(167,139,250,.45);display:flex;align-items:center;justify-content:center;transition:transform .2s;}
#fab:hover{transform:scale(1.1);}

/* MODALES */
.overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.72);display:flex;align-items:flex-start;justify-content:center;padding:26px 16px;overflow-y:auto;backdrop-filter:blur(3px);}
.modal{background:#0c0e1d;border:1px solid rgba(255,255,255,0.1);border-radius:15px;padding:20px;width:100%;max-width:460px;margin:auto;box-shadow:0 18px 55px rgba(0,0,0,.6);}
.modal h3{font-size:16px;margin-bottom:15px;}
.fg{margin-bottom:11px;}
label{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#6b7089;margin-bottom:4px;}
input,textarea,select{width:100%;background:#121423;border:1px solid rgba(255,255,255,0.08);border-radius:7px;padding:8px 11px;color:#e8e9f0;font-size:13px;font-family:system-ui;outline:none;transition:border-color .2s;}
input:focus,textarea:focus,select:focus{border-color:rgba(167,139,250,.5);}
select option{background:#121423;}
textarea{resize:vertical;min-height:78px;line-height:1.6;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:3px;}
.chip{padding:5px 11px;border-radius:14px;border:1px solid rgba(255,255,255,0.08);background:#121423;color:#6b7089;font-size:12px;cursor:pointer;font-family:system-ui;transition:all .14s;}
.chip.on{border-color:var(--cc,#a78bfa);color:var(--cc,#a78bfa);background:color-mix(in srgb,var(--cc,#a78bfa) 12%,transparent);}
.actions{display:flex;gap:6px;margin-top:15px;}
.bok{flex:1;padding:9px 15px;background:linear-gradient(135deg,#a78bfa,#f0abfc);color:white;border:none;border-radius:7px;font-size:13px;cursor:pointer;font-family:system-ui;}
.bcan{padding:9px 13px;background:#121423;color:#6b7089;border:1px solid rgba(255,255,255,0.08);border-radius:7px;font-size:13px;cursor:pointer;font-family:system-ui;}
.bdel{padding:9px 12px;background:rgba(225,29,72,.1);color:#f43f5e;border:1px solid rgba(225,29,72,.2);border-radius:7px;font-size:13px;cursor:pointer;font-family:system-ui;}
.mbb{width:100%;padding:11px 14px;text-align:left;font-size:13px;cursor:pointer;border-radius:7px;border:1px solid rgba(255,255,255,0.08);background:#121423;color:#e8e9f0;margin-bottom:6px;font-family:system-ui;transition:border-color .14s;}
.mbb:hover{border-color:rgba(255,255,255,.2);}
.mbb.p{background:linear-gradient(135deg,#a78bfa,#f0abfc);border:none;color:white;}
.rrow{display:flex;gap:5px;margin-bottom:5px;align-items:center;}
.rrow input{flex:1;}
.brm{background:none;border:none;color:#6b7089;cursor:pointer;font-size:14px;}
.brm:hover{color:#f43f5e;}
.bares{font-size:11px;color:#a78bfa;background:none;border:none;cursor:pointer;font-family:system-ui;padding:2px 0;}
.cpicks{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px;}
.cpick{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .14s;}
.cpick.on{border-color:white;transform:scale(1.15);}

#toast{position:fixed;bottom:74px;right:18px;z-index:900;background:#0c0e1d;border:1px solid rgba(255,255,255,0.1);border-radius:7px;padding:7px 13px;font-size:12px;transform:translateY(8px);opacity:0;transition:all .22s;pointer-events:none;}
#toast.show{transform:translateY(0);opacity:1;}
#tip{position:fixed;z-index:300;background:rgba(12,14,29,.96);border:1px solid rgba(255,255,255,0.09);border-radius:7px;padding:7px 11px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .1s;line-height:1.5;max-width:155px;}
.empty{text-align:center;padding:16px 0;color:#6b7089;font-size:12px;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.09);border-radius:2px;}
</style>
</head>
<body>

<header>
  <button class="nav-btn on" id="tab-cv" onclick="showCanvas()">Univers</button>
  <button class="nav-btn" id="tab-tx" onclick="showTexte()">Tout voir</button>
  <div class="hdr-right">
    <div class="search-wrap">
      <span class="s-icon">&#128301;</span>
      <input type="text" id="srch" placeholder="Telescope..." oninput="doSearch(this.value)" onblur="setTimeout(hideSearch,180)">
    </div>
    <a class="retour" href="index.html">&larr; Planificateur</a>
  </div>
</header>

<div id="cv-wrap"><canvas id="cv"></canvas></div>
<div id="view-texte"></div>
<div id="view-cours"></div>

<div id="panel">
  <div class="ph">
    <button class="ph-close" onclick="closePanel()">&#215;</button>
    <div class="ph-name" id="ph-name"></div>
    <div class="ph-sub" id="ph-sub"></div>
  </div>
  <div class="pb" id="pb"></div>
</div>

<div id="sr"></div>
<button id="fab" onclick="openAddMenu()">+</button>
<div id="toast"></div>
<div id="tip"></div>

<!-- MODAL MENU -->
<div class="overlay" id="m-menu" style="display:none" onclick="if(event.target===this)hide('m-menu')">
  <div class="modal">
    <h3>Ajouter...</h3>
    <button class="mbb p" onclick="hide('m-menu');openEclat(null)">* Eclat &mdash; note courte du quotidien</button>
    <button class="mbb" onclick="hide('m-menu');openCours(null,null)">Cours &mdash; formation, workshop, masterclass</button>
    <button class="mbb" onclick="hide('m-menu');openGalaxie(null)">+ Nouvelle galaxie</button>
    <button class="mbb" onclick="hide('m-menu');openPlanete(null,null)">+ Nouvelle planete</button>
    <button class="bcan" style="width:100%;margin-top:2px;" onclick="hide('m-menu')">Annuler</button>
  </div>
</div>

<!-- MODAL GALAXIE -->
<div class="overlay" id="m-gal" style="display:none" onclick="if(event.target===this)hide('m-gal')">
  <div class="modal">
    <h3 id="mg-t">Nouvelle galaxie</h3>
    <div class="fg"><label>Nom *</label><input id="mg-nom" type="text" placeholder="Musique, Code, Histoire..."></div>
    <div class="fg"><label>Couleur</label><div class="cpicks" id="mg-cols"></div></div>
    <div class="actions">
      <button class="bok" onclick="saveGalaxie()">Enregistrer</button>
      <button class="bcan" onclick="hide('m-gal')">Annuler</button>
      <button class="bdel" id="mg-del" style="display:none" onclick="delGalaxie()">Supprimer</button>
    </div>
  </div>
</div>

<!-- MODAL PLANETE -->
<div class="overlay" id="m-pla" style="display:none" onclick="if(event.target===this)hide('m-pla')">
  <div class="modal">
    <h3 id="mp-t">Nouvelle planete</h3>
    <div class="fg"><label>Nom *</label><input id="mp-nom" type="text" placeholder="Synthese, Medieval, UI Design..."></div>
    <div class="fg"><label>Galaxies * (une ou plusieurs)</label><div class="chips" id="mp-gals"></div></div>
    <div class="actions">
      <button class="bok" onclick="savePlanete()">Enregistrer</button>
      <button class="bcan" onclick="hide('m-pla')">Annuler</button>
      <button class="bdel" id="mp-del" style="display:none" onclick="delPlanete()">Supprimer</button>
    </div>
  </div>
</div>

<!-- MODAL ECLAT -->
<div class="overlay" id="m-ecl" style="display:none" onclick="if(event.target===this)hide('m-ecl')">
  <div class="modal">
    <h3>Eclat</h3>
    <div class="fg"><label>Texte *</label><textarea id="ee-txt" placeholder="L'info glanee..."></textarea></div>
    <div class="fg"><label>Planetes (une ou plusieurs) *</label><div class="chips" id="ee-chips"></div></div>
    <div class="fg"><label>Lien (optionnel)</label><input id="ee-lien" type="url" placeholder="https://..."></div>
    <div class="fg"><label>Date</label><input id="ee-date" type="date"></div>
    <div class="actions">
      <button class="bok" onclick="saveEclat()">Enregistrer</button>
      <button class="bcan" onclick="hide('m-ecl')">Annuler</button>
      <button class="bdel" id="ee-del" style="display:none" onclick="delEclat()">Supprimer</button>
    </div>
  </div>
</div>

<!-- MODAL COURS -->
<div class="overlay" id="m-crs" style="display:none" onclick="if(event.target===this)hide('m-crs')">
  <div class="modal">
    <h3 id="mc-t">Nouveau cours</h3>
    <div class="fg"><label>Titre *</label><input id="cc-titre" type="text" placeholder="Workshop Arca, Masterclass Mix..."></div>
    <div class="fg"><label>Planete *</label><select id="cc-pla"></select></div>
    <div class="fg"><label>Statut</label>
      <select id="cc-st">
        <option value="en-cours">En cours</option>
        <option value="pause">En pause</option>
        <option value="termine">Termine</option>
      </select>
    </div>
    <div class="fg"><label>Description</label><textarea id="cc-desc" style="min-height:54px;"></textarea></div>
    <div class="fg"><label>Liens du cours</label><div id="cc-liens"></div><button class="bares" onclick="addLienRow(null,null)">+ Lien</button></div>
    <div class="actions">
      <button class="bok" onclick="saveCours()">Enregistrer</button>
      <button class="bcan" onclick="hide('m-crs')">Annuler</button>
      <button class="bdel" id="cc-del" style="display:none" onclick="delCours()">Supprimer</button>
    </div>
  </div>
</div>

<!-- MODAL SEANCE -->
<div class="overlay" id="m-sea" style="display:none" onclick="if(event.target===this)hide('m-sea')">
  <div class="modal">
    <h3 id="ms-t">Seance</h3>
    <div class="row2">
      <div class="fg"><label>Date *</label><input id="ss-date" type="date"></div>
      <div class="fg"><label>Titre</label><input id="ss-titre" type="text" placeholder="Jour 1..."></div>
    </div>
    <div class="fg"><label>Notes</label><textarea id="ss-notes" rows="8" placeholder="Notes libres..." style="min-height:160px;"></textarea></div>
    <div class="fg"><label>Ressources</label><div id="ss-res"></div><button class="bares" onclick="addResRow(null,null)">+ Lien</button></div>
    <div class="actions">
      <button class="bok" onclick="saveSeance()">Enregistrer</button>
      <button class="bcan" onclick="hide('m-sea')">Annuler</button>
      <button class="bdel" id="ss-del" style="display:none" onclick="delSeance()">Supprimer</button>
    </div>
  </div>
</div>

<script>
var PALETTE=['#a78bfa','#f59e0b','#34d399','#22d3ee','#fb923c','#f472b6','#e11d48','#a3e635','#60a5fa','#c084fc','#38bdf8','#4ade80'];

function load(){
  var def={galaxies:[],planetes:[],eclats:[],cours:[]};
  try{
    var d=JSON.parse(localStorage.getItem('univers2')||'null')||def;
    // Migration : gid -> gids
    d.planetes.forEach(function(p){
      if(p.gid&&!p.gids) p.gids=[p.gid];
      if(!p.gids) p.gids=[];
    });
    return d;
  }catch(e){return def;}
}
function save(d){
  // Garder gid = première galaxie pour compatibilité cours/exports
  d.planetes.forEach(function(p){
    if(p.gids&&p.gids.length) p.gid=p.gids[0];
  });
  localStorage.setItem('univers2',JSON.stringify(d));
  try{window.parent.postMessage({type:'univers2-updated'},'*');}catch(e){}
}

function initDemo(){
  var d=load();
  if(d.galaxies.length) return;
  d.galaxies=[
    {id:'g1',nom:'Musique',couleur:'#a78bfa',x:-220,y:-80},
    {id:'g2',nom:'Histoire',couleur:'#f59e0b',x:200,y:60}
  ];
  d.planetes=[
    {id:'p1',gid:'g1',nom:'Synthese',ax:-100,ay:-70},
    {id:'p2',gid:'g1',nom:'Mixage',ax:95,ay:-65},
    {id:'p3',gid:'g1',nom:'Harmonie',ax:-30,ay:105},
    {id:'p4',gid:'g2',nom:'Medieval',ax:-95,ay:-65},
    {id:'p5',gid:'g2',nom:'Prehistoire',ax:85,ay:75}
  ];
  save(d);
}

// ─── ETAT ───────────────────────────────────────────────────
var cam={x:0,y:0,scale:1};
var drag={on:false,sx:0,sy:0,cx:0,cy:0,moved:false};
var pinch={on:false,d0:0,s0:1};
var hovGal=null,hovPla=null;
var openGals={};
var curPlanet=null,curCoursId=null;
var editEcl=null,editCrs=null,editGal=null,editPla=null,editSeaIdx=null;
var newGalPos=null; // position monde pour nouvelle galaxie via clic droit
var newPlaPos=null; // position monde pour nouvelle planète via clic droit
var curView='canvas';
var objs=[];

// ─── CANVAS ──────────────────────────────────────────────────
var cv,ctx,W,H;

function initCanvas(){
  cv=document.getElementById('cv');
  resize();
  window.addEventListener('resize',resize);
  cv.addEventListener('mousedown',onMD);
  window.addEventListener('mousemove',onMM);
  window.addEventListener('mouseup',onMU);
  cv.addEventListener('wheel',onWH,{passive:false});
  cv.addEventListener('touchstart',onTS,{passive:false});
  cv.addEventListener('touchmove',onTM,{passive:false});
  cv.addEventListener('touchend',onTE,{passive:false});
  // Clic droit desktop
  cv.addEventListener('contextmenu',function(e){
    e.preventDefault();
    var rect=cv.getBoundingClientRect();
    var mx=e.clientX-rect.left, my=e.clientY-rect.top;
    var o=hitObj(mx,my);
    if(!o) showCtxMenu(e.clientX,e.clientY,sw(mx),sh(my));
  });
  initDemo();
  draw();
}

function resize(){
  var wr=document.getElementById('cv-wrap');
  W=wr.offsetWidth;H=wr.offsetHeight;
  cv.width=W;cv.height=H;draw();
}

// monde->ecran
function wx(x){return x*cam.scale+W/2+cam.x;}
function wy(y){return y*cam.scale+H/2+cam.y;}
// ecran->monde
function sw(x){return (x-W/2-cam.x)/cam.scale;}
function sh(y){return (y-H/2-cam.y)/cam.scale;}

function draw(){
  if(!cv)return;
  ctx=cv.getContext('2d');
  ctx.clearRect(0,0,W,H);
  drawBg();
  var d=load();
  objs=[];
  d.galaxies.forEach(function(g){drawGalaxy(g,d);});
  d.eclats.forEach(function(e){drawEclat(e,d);});
}

function drawBg(){
  // fond degrade subtil
  var bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H));
  bg.addColorStop(0,'#0a0c1a');bg.addColorStop(1,'#060810');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // etoiles fixes (pas influencees par cam)
  var seed=54321;
  for(var i=0;i<200;i++){
    seed=(seed*1664525+1013904223)&0xffffffff;
    var sx=((Math.abs(seed)%10000)/10000)*W;
    seed=(seed*1664525+1013904223)&0xffffffff;
    var sy=((Math.abs(seed)%10000)/10000)*H;
    seed=(seed*1664525+1013904223)&0xffffffff;
    var sa=0.08+((Math.abs(seed)%6)/10);
    seed=(seed*1664525+1013904223)&0xffffffff;
    var sr=0.35+((Math.abs(seed)%6)/10);
    ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,'+sa+')';ctx.fill();
  }
}

function drawGalaxy(g,d){
  var sx=wx(g.x),sy=wy(g.y);
  var br=26*cam.scale;
  var isOpen=!!openGals[g.id];
  var isHov=hovGal&&hovGal.id===g.id;

  // Halo nebuleux
  var hr=isOpen?br*6:br*3.8;
  var halo=ctx.createRadialGradient(sx,sy,0,sx,sy,hr);
  halo.addColorStop(0,g.couleur+'28');
  halo.addColorStop(0.45,g.couleur+'0d');
  halo.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(sx,sy,hr,0,Math.PI*2);
  ctx.fillStyle=halo;ctx.fill();

  // Etoile centrale
  var r=isHov?br*1.1:br;
  var grad=ctx.createRadialGradient(sx-r*.3,sy-r*.4,0,sx,sy,r);
  grad.addColorStop(0,lighten(g.couleur,.45));grad.addColorStop(1,g.couleur);
  ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);
  ctx.fillStyle=grad;ctx.fill();

  if(isHov||isOpen){
    ctx.beginPath();ctx.arc(sx,sy,r*1.45,0,Math.PI*2);
    ctx.strokeStyle=g.couleur+'3a';ctx.lineWidth=1.5*cam.scale;ctx.stroke();
  }

  // Nom
  ctx.save();
  ctx.font='600 '+(12*Math.max(.6,cam.scale))+'px system-ui';
  ctx.fillStyle=isOpen||isHov?g.couleur:'rgba(255,255,255,.7)';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText(g.nom,sx,sy+r+5*cam.scale);
  ctx.restore();

  objs.push({type:'g',id:g.id,x:sx,y:sy,r:r,data:g});

  if(isOpen){
    var pls=d.planetes.filter(function(p){return (p.gids||[p.gid]).indexOf(g.id)>=0;});
    pls.forEach(function(p){drawPlanete(p,g,d);});
  }
}

function drawPlanete(p,callerG,d){
  // Toutes les galaxies parentes de cette planète
  var gids=p.gids||[p.gid];
  var parentGs=gids.map(function(gid){return d.galaxies.find(function(x){return x.id===gid;});}).filter(Boolean);
  if(!parentGs.length) return;

  // Position = centroïde des galaxies parentes
  var cx2=parentGs.reduce(function(s,g){return s+g.x;},0)/parentGs.length;
  var cy2=parentGs.reduce(function(s,g){return s+g.y;},0)/parentGs.length;
  var ax=cx2+p.ax, ay=cy2+p.ay;
  var sx=wx(ax),sy=wy(ay);

  var nc=d.cours.filter(function(c){return c.pid===p.id;}).length;
  var ne=d.eclats.filter(function(e){return (e.pids||[]).indexOf(p.id)>=0;}).length;
  var pr=(13+Math.min((nc+ne)*2,18))*cam.scale;
  var isHov=hovPla&&hovPla.id===p.id;
  var isSel=curPlanet&&curPlanet.id===p.id;

  // Lignes vers chaque galaxie parente (seulement si ouverte)
  parentGs.forEach(function(g){
    if(!openGals[g.id]) return;
    var gsx=wx(g.x),gsy=wy(g.y);
    ctx.beginPath();ctx.moveTo(gsx,gsy);ctx.lineTo(sx,sy);
    ctx.strokeStyle=g.couleur+'1e';ctx.lineWidth=1*cam.scale;ctx.stroke();
  });

  // Halo planete (couleur de la première galaxie parente ouverte)
  var mainG=parentGs.find(function(g){return openGals[g.id];})||parentGs[0];
  var ph=ctx.createRadialGradient(sx,sy,0,sx,sy,pr*2.4);
  ph.addColorStop(0,mainG.couleur+'18');ph.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(sx,sy,pr*2.4,0,Math.PI*2);ctx.fillStyle=ph;ctx.fill();

  // Corps
  var r2=isHov||isSel?pr*1.1:pr;
  var pg=ctx.createRadialGradient(sx-r2*.3,sy-r2*.35,0,sx,sy,r2);
  pg.addColorStop(0,lighten(mainG.couleur,.28));pg.addColorStop(1,mainG.couleur+'bb');
  ctx.beginPath();ctx.arc(sx,sy,r2,0,Math.PI*2);ctx.fillStyle=pg;ctx.fill();

  // Anneaux multi-galaxies si plusieurs parents
  if(parentGs.length>1){
    var segAngle=Math.PI*2/parentGs.length;
    parentGs.forEach(function(g,i){
      ctx.beginPath();
      ctx.arc(sx,sy,r2*1.38,i*segAngle,(i+1)*segAngle);
      ctx.strokeStyle=g.couleur+'99';ctx.lineWidth=2*cam.scale;ctx.stroke();
    });
  } else if(isHov||isSel){
    ctx.beginPath();ctx.arc(sx,sy,r2*1.38,0,Math.PI*2);
    ctx.strokeStyle=mainG.couleur+'50';ctx.lineWidth=1.2*cam.scale;ctx.stroke();
  }

  var fs=10*Math.max(.6,cam.scale);
  ctx.save();
  ctx.font=fs+'px system-ui';
  ctx.fillStyle=isHov||isSel?'rgba(255,255,255,.95)':'rgba(255,255,255,.6)';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText(p.nom,sx,sy+r2+4*cam.scale);
  if(nc+ne>0){
    ctx.font=(fs*.85)+'px system-ui';ctx.fillStyle='rgba(255,255,255,.3)';
    ctx.fillText(nc+' cours / '+ne+' eclats',sx,sy+r2+4*cam.scale+fs+3);
  }
  ctx.restore();

  objs.push({type:'p',id:p.id,x:sx,y:sy,r:r2,gid:mainG.id,data:p,gdata:mainG});
}

function drawEclat(e,d){
  if(!(e.pids&&e.pids.length)) return;
  var positions=[];
  e.pids.forEach(function(pid){
    var p=d.planetes.find(function(x){return x.id===pid;});
    if(!p) return;
    var gids=p.gids||[p.gid];
    var parentGs=gids.map(function(gid){return d.galaxies.find(function(x){return x.id===gid;});}).filter(Boolean);
    var anyOpen=parentGs.some(function(g){return openGals[g.id];});
    if(!anyOpen) return;
    var cx2=parentGs.reduce(function(s,g){return s+g.x;},0)/parentGs.length;
    var cy2=parentGs.reduce(function(s,g){return s+g.y;},0)/parentGs.length;
    var mainG=parentGs.find(function(g){return openGals[g.id];})||parentGs[0];
    positions.push({wx:cx2+p.ax,wy:cy2+p.ay,col:mainG.couleur});
  });
  if(!positions.length) return;

  var cx2=positions.reduce(function(s,p){return s+p.wx;},0)/positions.length;
  var cy2=positions.reduce(function(s,p){return s+p.wy;},0)/positions.length;
  var sx=wx(cx2),sy=wy(cy2);
  var er=5*cam.scale;

  positions.forEach(function(pos){
    ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(wx(pos.wx),wy(pos.wy));
    ctx.strokeStyle=pos.col+'2a';ctx.lineWidth=.7*cam.scale;ctx.stroke();
  });

  ctx.beginPath();ctx.arc(sx,sy,er,0,Math.PI*2);
  ctx.fillStyle='rgba(255,252,200,.6)';ctx.fill();
  ctx.beginPath();ctx.arc(sx,sy,er*2,0,Math.PI*2);
  ctx.fillStyle='rgba(255,250,180,.08)';ctx.fill();

  objs.push({type:'e',id:e.id,x:sx,y:sy,r:er*2.5,data:e});
}

  var m=document.createElement('div');
  m.id='ctx-menu';
  m.style.cssText='position:fixed;z-index:600;background:#0c0e1d;border:1px solid rgba(255,255,255,0.12);border-radius:9px;padding:5px;box-shadow:0 8px 28px rgba(0,0,0,.6);min-width:170px;';
  m.style.left=Math.min(screenX,window.innerWidth-180)+'px';
  m.style.top=Math.min(screenY,window.innerHeight-80)+'px';
  var btnStyle='display:block;width:100%;text-align:left;padding:9px 13px;background:none;border:none;color:#e8e9f0;font-size:13px;cursor:pointer;border-radius:6px;font-family:system-ui;';
  var btnHov='onmouseover="this.style.background=\'rgba(255,255,255,.07)\'" onmouseout="this.style.background=\'none\'"';
  m.innerHTML=
    '<button onclick="hideCtxMenu();openGalaxie(null,{x:'+worldX+',y:'+worldY+'})" style="'+btnStyle+'" '+btnHov+'>✨ Nouvelle galaxie ici</button>'+
    '<div style="height:1px;background:rgba(255,255,255,.06);margin:3px 0;"></div>'+
    '<button onclick="hideCtxMenu();openPlanete(null,null,{x:'+worldX+',y:'+worldY+'})" style="'+btnStyle+'" '+btnHov+'>🪐 Nouvelle planète ici</button>';

  setTimeout(function(){document.addEventListener('click',hideCtxMenu,{once:true});},10);
}
function hideCtxMenu(){var m=document.getElementById('ctx-menu');if(m)m.remove();}

function hitObj(ex,ey){
  for(var i=objs.length-1;i>=0;i--){
    var o=objs[i];var dx=o.x-ex,dy=o.y-ey;
    if(Math.sqrt(dx*dx+dy*dy)<=o.r*1.2) return o;
  }
  return null;
}

function onMD(e){drag.on=true;drag.sx=e.clientX;drag.sy=e.clientY-48;drag.cx=cam.x;drag.cy=cam.y;drag.moved=false;}

function onMM(e){
  if(drag.on){
    var dx=e.clientX-drag.sx,dy=(e.clientY-48)-drag.sy;
    if(Math.abs(dx)+Math.abs(dy)>3) drag.moved=true;
    cam.x=drag.cx+dx;cam.y=drag.cy+dy;draw();return;
  }
  if(curView!=='canvas') return;
  var rect=cv.getBoundingClientRect();
  var mx=e.clientX-rect.left,my=e.clientY-rect.top;
  var o=hitObj(mx,my);
  var ph=hovGal,pp=hovPla;
  hovGal=(o&&o.type==='g')?o.data:null;
  hovPla=(o&&o.type==='p')?o.data:null;
  if(hovGal!==ph||hovPla!==pp) draw();
  var tip=document.getElementById('tip');
  if(o){
    cv.style.cursor='pointer';
    if(o.type==='g'){
      var np=load().planetes.filter(function(p){return p.gid===o.id;}).length;
      tip.innerHTML='<strong>'+esc(o.data.nom)+'</strong><br><span style="color:#6b7089;font-size:11px;">'+np+' planete'+(np!==1?'s':'')+'</span>';
    } else if(o.type==='p'){
      var d2=load();
      var nc=d2.cours.filter(function(c){return c.pid===o.id;}).length;
      var ne=d2.eclats.filter(function(e2){return (e2.pids||[]).indexOf(o.id)>=0;}).length;
      tip.innerHTML='<strong>'+esc(o.data.nom)+'</strong><br><span style="color:#6b7089;font-size:11px;">'+nc+' cours &middot; '+ne+' eclats</span>';
    } else {
      tip.innerHTML='<span style="font-size:11px;">'+esc((o.data.texte||'').slice(0,60))+'</span>';
    }
    tip.style.left=(e.clientX+13)+'px';tip.style.top=(e.clientY-8)+'px';tip.style.opacity='1';
  } else {cv.style.cursor='grab';tip.style.opacity='0';}
}

function onMU(e){
  if(!drag.on) return;drag.on=false;
  if(drag.moved){draw();return;}
  var rect=cv.getBoundingClientRect();
  click(e.clientX-rect.left,e.clientY-rect.top);
}

function click(mx,my){
  var o=hitObj(mx,my);
  if(!o){closePanel();return;}
  if(o.type==='g'){
    openGals[o.id]=!openGals[o.id];
    if(!openGals[o.id]&&curPlanet){
      var d=load();
      var p=d.planetes.find(function(x){return x.id===curPlanet.id;});
      var gids=p?(p.gids||[p.gid]):[];
      var anyOpen=gids.some(function(gid){return openGals[gid];});
      if(!anyOpen) closePanel();
    }
    draw();
  } else if(o.type==='p'){
    openPanel(o.data,o.gdata);
  } else if(o.type==='e'){
    openEclat(o.id);
  }
}

function zoomAt(mx,my,factor){
  var wx0=sw(mx),wy0=sh(my);
  cam.scale=Math.max(.18,Math.min(3.5,cam.scale*factor));
  cam.x=mx-wx0*cam.scale-W/2;
  cam.y=my-wy0*cam.scale-H/2;
  draw();
}

function onWH(e){
  e.preventDefault();
  var rect=cv.getBoundingClientRect();
  zoomAt(e.clientX-rect.left,e.clientY-rect.top,e.deltaY>0?.88:1.14);
}

function pdist(t){var dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.sqrt(dx*dx+dy*dy);}

var longPressTimer=null;
var longPressPos=null;

function onTS(e){
  if(e.touches.length===2){pinch.on=true;pinch.d0=pdist(e.touches);pinch.s0=cam.scale;e.preventDefault();return;}
  var t=e.touches[0];
  drag.on=true;drag.moved=false;drag.sx=t.clientX;drag.sy=t.clientY-48;drag.cx=cam.x;drag.cy=cam.y;
  // Long press
  var rect=cv.getBoundingClientRect();
  var mx=t.clientX-rect.left, my=t.clientY-rect.top;
  longPressPos={cx:t.clientX,cy:t.clientY,wx:sw(mx),wy:sh(my)};
  longPressTimer=setTimeout(function(){
    if(!drag.moved){
      var o=hitObj(mx,my);
      if(!o) showCtxMenu(longPressPos.cx,longPressPos.cy,longPressPos.wx,longPressPos.wy);
    }
  },520);
}

function onTM(e){
  if(pinch.on&&e.touches.length===2){
    e.preventDefault();
    var nd=pdist(e.touches);
    var mc={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2};
    var rect=cv.getBoundingClientRect();
    zoomAt(mc.x-rect.left,mc.y-rect.top,nd/pinch.d0*pinch.s0/cam.scale);
    pinch.d0=nd;return;
  }
  if(!drag.on||e.touches.length!==1) return;
  var t=e.touches[0];
  var dx=t.clientX-drag.sx,dy=(t.clientY-48)-drag.sy;
  if(Math.abs(dx)+Math.abs(dy)>3){drag.moved=true;clearTimeout(longPressTimer);}
  cam.x=drag.cx+dx;cam.y=drag.cy+dy;draw();
}

function onTE(e){
  clearTimeout(longPressTimer);
  if(pinch.on){pinch.on=false;return;}
  if(!drag.on) return;drag.on=false;
  if(drag.moved){draw();return;}
  var t=e.changedTouches[0];
  var rect=cv.getBoundingClientRect();
  click(t.clientX-rect.left,t.clientY-rect.top);
}

// ─── PANNEAU ─────────────────────────────────────────────────
function openPanel(planet,gdata){
  curPlanet=planet;
  var d=load();
  var gids=planet.gids||[planet.gid];
  var parentGs=gids.map(function(gid){return d.galaxies.find(function(x){return x.id===gid;});}).filter(Boolean);
  var mainG=gdata||(parentGs[0]);
  document.getElementById('ph-name').textContent=planet.nom;
  document.getElementById('ph-name').style.color=mainG?mainG.couleur:'#a78bfa';
  // Sous-titre : toutes les galaxies parentes
  var subTxt=parentGs.length>1
    ? parentGs.map(function(g){return g.nom;}).join(' · ')
    : (mainG?'Galaxie '+mainG.nom:'');
  document.getElementById('ph-sub').textContent=subTxt;
  document.getElementById('panel').style.setProperty('--pc',mainG?mainG.couleur:'#a78bfa');

  var cours=d.cours.filter(function(c){return c.pid===planet.id;});
  var eclats=d.eclats.filter(function(e){return (e.pids||[]).indexOf(planet.id)>=0;});
  eclats.sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});

  var html='<div class="psec"><div class="slabel">Cours</div>';
  if(!cours.length) html+='<div class="empty">Aucun cours</div>';
  cours.forEach(function(c){
    var nb=(c.seances||[]).length;
    html+='<div class="cc" onclick="openCoursDetail(\''+c.id+'\')">'+
      '<div class="cc-t">'+esc(c.titre)+'</div>'+
      '<div class="cc-m"><span>'+nb+' seance'+(nb!==1?'s':'')+'</span><span class="st '+(c.statut||'en-cours')+'">'+stLabel(c.statut)+'</span></div></div>';
  });
  html+='<button class="add-s" onclick="openCours(null,\''+planet.id+'\')" style="--pc:'+(mainG?mainG.couleur:'#a78bfa')+';">+ Nouveau cours</button></div>';

  html+='<div class="psec"><div class="slabel">Eclats</div>';
  if(!eclats.length) html+='<div class="empty">Aucun eclat</div>';
  eclats.forEach(function(e){
    html+='<div class="ec"><div class="ec-t">'+esc(e.texte)+'</div>'+
      '<div class="ec-m">'+(e.date?'<span>'+fmtDate(e.date)+'</span>':'')+
      (e.lien?'<a href="'+e.lien+'" target="_blank">lien</a>':'')+
      '<button onclick="openEclat(\''+e.id+'\')">modifier</button></div></div>';
  });
  html+='<button class="add-s" onclick="openEclat(null)" style="--pc:'+(mainG?mainG.couleur:'#a78bfa')+';">+ Nouvel eclat</button></div>';

  html+='<div class="psec" style="border-top:1px solid rgba(255,255,255,.06);padding-top:12px;">';
  // Boutons modifier pour chaque galaxie parente
  parentGs.forEach(function(g){
    html+='<button class="add-s" onclick="openGalaxie(\''+g.id+'\')" style="--pc:#555575;">Modifier galaxie '+esc(g.nom)+'</button>';
  });
  html+='<button class="add-s" onclick="openPlanete(\''+planet.id+'\',null)" style="--pc:#555575;margin-top:4px;">Modifier la planete</button></div>';

  document.getElementById('pb').innerHTML=html;
  document.getElementById('panel').classList.add('open');
  draw();
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  curPlanet=null;draw();
}

function doSearch(q){
  var box=document.getElementById('sr');
  if(!q.trim()){box.style.display='none';return;}
  q=q.toLowerCase();
  var d=load();var res=[];
  d.eclats.forEach(function(e){
    if((e.texte||'').toLowerCase().indexOf(q)<0) return;
    var tags=(e.pids||[]).map(function(pid){var p=d.planetes.find(function(x){return x.id===pid;});return p?p.nom:'';}).filter(Boolean).join(', ');
    res.push({type:'eclat',id:e.id,txt:e.texte,tags:tags});
  });
  d.cours.forEach(function(c){
    if((c.titre||'').toLowerCase().indexOf(q)<0&&(c.description||'').toLowerCase().indexOf(q)<0) return;
    var p=d.planetes.find(function(x){return x.id===c.pid;});
    var g=p?d.galaxies.find(function(x){return x.id===p.gid;}):null;
    res.push({type:'cours',id:c.id,txt:c.titre,tags:(g?g.nom+' > ':''+(p?p.nom:''))});
  });
  d.cours.forEach(function(c){
    (c.seances||[]).forEach(function(s){
      if((s.notes||'').toLowerCase().indexOf(q)<0) return;
      res.push({type:'seance',cid:c.id,txt:(s.titre||fmtDate(s.date))+' — '+s.notes.slice(0,60),tags:c.titre});
    });
  });
  if(!res.length){box.innerHTML='<div class="sri"><div class="srx" style="color:#6b7089;">Aucun resultat</div></div>';box.style.display='block';return;}
  var h='';
  res.slice(0,10).forEach(function(r){
    var act=r.type==='cours'?"openCoursDetail('"+r.id+"')":(r.type==='seance'?"openCoursDetail('"+r.cid+"')":'openEclat(\''+r.id+'\')');
    h+='<div class="sri" onclick="'+act+';hideSearch();">'+
      '<div class="srt">'+(r.type==='eclat'?'Eclat':r.type==='cours'?'Cours':'Seance')+'</div>'+
      '<div class="srx">'+esc((r.txt||'').slice(0,80))+'</div>'+
      (r.tags?'<div class="srg">'+esc(r.tags)+'</div>':'')+
      '</div>';
  });
  box.innerHTML=h;box.style.display='block';
}
function hideSearch(){document.getElementById('sr').style.display='none';}

// ─── EXPORT MARKDOWN ─────────────────────────────────────────
function exportMd(id){
  var d=load();
  var cours=d.cours.find(function(x){return x.id===id;});
  if(!cours) return;
  var p=d.planetes.find(function(x){return x.id===cours.pid;});
  var g=p?d.galaxies.find(function(x){return x.id===p.gid;}):null;
  var lines=['# '+cours.titre,''];
  if(g||p) lines.push('**'+(g?g.nom:'')+(p?' > '+p.nom:'')+'** — '+stLabel(cours.statut),'');
  if(cours.description) lines.push(cours.description,'');
  if(cours.liens&&cours.liens.length){lines.push('## Liens','');cours.liens.forEach(function(l){lines.push('- ['+(l.label||l.url)+']('+l.url+')');});lines.push('');}
  var sea=(cours.seances||[]).slice().sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});
  sea.forEach(function(s){
    lines.push('## '+(s.titre||fmtDate(s.date))+(s.titre&&s.date?' — '+fmtDate(s.date):''),'');
    if(s.notes) lines.push(s.notes,'');
    if(s.ressources&&s.ressources.length){lines.push('**Ressources**');s.ressources.forEach(function(r){lines.push('- ['+(r.label||r.url)+']('+r.url+')');});lines.push('');}
  });
  var blob=new Blob([lines.join('\n')],{type:'text/markdown'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=(cours.titre||'cours').replace(/[^a-z0-9]/gi,'_')+'.md';a.click();
  toast('Export telecharge');
}

var selCol=PALETTE[0];
function openGalaxie(editId,pos){

function pickCol(el,c){selCol=c;document.querySelectorAll('.cpick').forEach(function(e){e.classList.remove('on');});el.classList.add('on');}
function saveGalaxie(){
  var nom=document.getElementById('mg-nom').value.trim();
  if(!nom){toast('Nom obligatoire');return;}
  var d=load();
  if(editGal){var g=d.galaxies.find(function(x){return x.id===editGal;});if(g){g.nom=nom;g.couleur=selCol;}}
  else{
    var px=newGalPos?newGalPos.x:(Math.cos(Math.random()*Math.PI*2)*(250+Math.random()*200));
    var py=newGalPos?newGalPos.y:(Math.sin(Math.random()*Math.PI*2)*(250+Math.random()*200));
    d.galaxies.push({id:'g'+Date.now(),nom:nom,couleur:selCol,x:px,y:py});
    newGalPos=null;
  }
  save(d);hide('m-gal');toast('Galaxie enregistree');draw();if(curView==='texte')renderTexte();
}
function delGalaxie(){
  if(!editGal) return;
  var d=load();var g=d.galaxies.find(function(x){return x.id===editGal;});
  if(!g||!confirm('Supprimer "'+g.nom+'" et ses planetes exclusives ?')) return;
  // Planètes qui n'appartiennent QU'à cette galaxie → supprimer
  var exclusivePids=d.planetes.filter(function(p){
    var gs=p.gids||[p.gid];return gs.length===1&&gs[0]===editGal;
  }).map(function(p){return p.id;});
  // Planètes multi-galaxies → retirer juste cette galaxie
  d.planetes.forEach(function(p){
    p.gids=(p.gids||[p.gid]).filter(function(gid){return gid!==editGal;});
    if(p.gids.length) p.gid=p.gids[0];
  });
  d.planetes=d.planetes.filter(function(p){return p.gids.length>0;});
  d.cours=d.cours.filter(function(c){return exclusivePids.indexOf(c.pid)<0;});
  d.eclats.forEach(function(e){e.pids=(e.pids||[]).filter(function(pid){return exclusivePids.indexOf(pid)<0;});});
  d.galaxies=d.galaxies.filter(function(x){return x.id!==editGal;});
  delete openGals[editGal];
  save(d);hide('m-gal');toast('Galaxie supprimee');closePanel();draw();if(curView==='texte')renderTexte();
}

// Planete
function openPlanete(editId,defGid,pos){
  editPla=editId||null;
  newPlaPos=pos||null;
  var d=load();var p=editId?d.planetes.find(function(x){return x.id===editId;}):null;
  document.getElementById('mp-t').textContent=p?'Modifier la planete':'Nouvelle planete';
  document.getElementById('mp-nom').value=p?p.nom:'';
  document.getElementById('mp-del').style.display=p?'':'none';
  var selGids=p?(p.gids||[p.gid]):(defGid?[defGid]:[]);
  var h='';
  d.galaxies.forEach(function(g){
    var on=selGids.indexOf(g.id)>=0;
    h+='<button class="chip'+(on?' on':'')+'" style="--cc:'+g.couleur+';" data-gid="'+g.id+'" onclick="this.classList.toggle(\'on\')">'+esc(g.nom)+'</button>';
  });
  document.getElementById('mp-gals').innerHTML=h;
  show('m-pla');setTimeout(function(){document.getElementById('mp-nom').focus();},80);
}
function savePlanete(){
  var nom=document.getElementById('mp-nom').value.trim();
  var gids=[];
  document.querySelectorAll('#mp-gals .chip.on').forEach(function(b){gids.push(b.dataset.gid);});
  if(!nom){toast('Nom obligatoire');return;}
  if(!gids.length){toast('Choisis au moins une galaxie');return;}
  var d=load();
  if(editPla){
    var p=d.planetes.find(function(x){return x.id===editPla;});
    if(p){p.nom=nom;p.gids=gids;p.gid=gids[0];}
  } else {
    var ax,ay;
    if(newPlaPos){
      // Calculer offset par rapport au centroïde des galaxies parentes
      var parentGs=gids.map(function(gid){return d.galaxies.find(function(x){return x.id===gid;});}).filter(Boolean);
      var cx2=parentGs.reduce(function(s,g){return s+g.x;},0)/parentGs.length;
      var cy2=parentGs.reduce(function(s,g){return s+g.y;},0)/parentGs.length;
      ax=newPlaPos.x-cx2; ay=newPlaPos.y-cy2;
      newPlaPos=null;
    } else {
      var a=Math.random()*Math.PI*2,r2=75+Math.random()*55;
      ax=Math.cos(a)*r2; ay=Math.sin(a)*r2;
    }
    d.planetes.push({id:'p'+Date.now(),gids:gids,gid:gids[0],nom:nom,ax:ax,ay:ay});
    gids.forEach(function(gid){openGals[gid]=true;});
  }
  save(d);hide('m-pla');toast('Planete enregistree');draw();if(curView==='texte')renderTexte();
}
function delPlanete(){
  if(!editPla) return;
  var d=load();var p=d.planetes.find(function(x){return x.id===editPla;});
  if(!p||!confirm('Supprimer "'+p.nom+'" ?')) return;
  d.cours=d.cours.filter(function(c){return c.pid!==editPla;});
  d.eclats.forEach(function(e){e.pids=(e.pids||[]).filter(function(pid){return pid!==editPla;});});
  d.planetes=d.planetes.filter(function(x){return x.id!==editPla;});
  save(d);hide('m-pla');toast('Planete supprimee');closePanel();draw();if(curView==='texte')renderTexte();
}

function openCours(editId,defPid){

  var h='';
  d.galaxies.forEach(function(g){

  });

function addLienRow(url,label){
  var div=document.createElement('div');div.className='rrow';
  div.innerHTML='<input type="url" class="lurl" placeholder="https://..." value="'+(url||'')+'"><input type="text" class="llbl" placeholder="Nom" style="max-width:125px;" value="'+(label||'')+'"><button class="brm" onclick="this.parentNode.remove()">x</button>';
  document.getElementById('cc-liens').appendChild(div);
}
function saveCours(){
  var titre=document.getElementById('cc-titre').value.trim();
  var pid=document.getElementById('cc-pla').value;
  if(!titre){toast('Titre obligatoire');return;}
  if(!pid){toast('Choisis une planete');return;}
  var liens=[];
  document.querySelectorAll('.lurl').forEach(function(el){var u=el.value.trim(),l=el.nextElementSibling.value.trim();if(u)liens.push({url:u,label:l});});
  var d=load();
  if(editCrs){var c=d.cours.find(function(x){return x.id===editCrs;});if(c){c.titre=titre;c.pid=pid;c.statut=document.getElementById('cc-st').value;c.description=document.getElementById('cc-desc').value.trim();c.liens=liens;}}
  else{var nid='c'+Date.now();d.cours.push({id:nid,titre:titre,pid:pid,statut:document.getElementById('cc-st').value,description:document.getElementById('cc-desc').value.trim(),liens:liens,seances:[]});}
  save(d);hide('m-crs');toast('Cours enregistre');
  if(curPlanet&&curPlanet.id===pid) openPanel(curPlanet); else draw();
  if(curView==='texte') renderTexte();
}
function delCours(){
  if(!editCrs) return;
  var d=load();var c=d.cours.find(function(x){return x.id===editCrs;});
  if(!c||!confirm('Supprimer "'+c.titre+'" ?')) return;
  d.cours=d.cours.filter(function(x){return x.id!==editCrs;});
  save(d);hide('m-crs');toast('Cours supprime');
  if(curView==='cours') backFromCours();
  else if(curPlanet) openPanel(curPlanet);
  else draw();
}

// Seance
function openSeance(cid,idx){
  curCoursId=cid;editSeaIdx=(idx!==null&&idx!==undefined)?idx:null;
  var d=load();var cours=d.cours.find(function(x){return x.id===cid;});
  var s=(editSeaIdx!==null&&cours)?cours.seances[editSeaIdx]:null;
  document.getElementById('ms-t').textContent=s?'Modifier la seance':'Nouvelle seance';
  document.getElementById('ss-date').value=s?(s.date||today()):today();
  document.getElementById('ss-titre').value=s?(s.titre||''):'';
  document.getElementById('ss-notes').value=s?(s.notes||''):'';
  document.getElementById('ss-del').style.display=s?'':'none';
  document.getElementById('ss-res').innerHTML='';
  (s?s.ressources||[]:[]).forEach(function(r){addResRow(r.url,r.label);});
  show('m-sea');setTimeout(function(){document.getElementById('ss-notes').focus();},80);
}
function addResRow(url,label){
  var div=document.createElement('div');div.className='rrow';
  div.innerHTML='<input type="url" class="rurl" placeholder="https://..." value="'+(url||'')+'"><input type="text" class="rlbl" placeholder="Nom" style="max-width:125px;" value="'+(label||'')+'"><button class="brm" onclick="this.parentNode.remove()">x</button>';
  document.getElementById('ss-res').appendChild(div);
}
function saveSeance(){
  var date=document.getElementById('ss-date').value;
  if(!date){toast('Date obligatoire');return;}
  var res=[];
  document.querySelectorAll('.rurl').forEach(function(el){var u=el.value.trim(),l=el.nextElementSibling.value.trim();if(u)res.push({url:u,label:l});});
  var d=load();var cours=d.cours.find(function(x){return x.id===curCoursId;});
  if(!cours) return;if(!cours.seances)cours.seances=[];
  var s={id:'s'+Date.now(),date:date,titre:document.getElementById('ss-titre').value.trim(),notes:document.getElementById('ss-notes').value.trim(),ressources:res};
  if(editSeaIdx!==null){s.id=cours.seances[editSeaIdx].id;cours.seances[editSeaIdx]=s;}
  else cours.seances.push(s);
  save(d);hide('m-sea');toast('Seance enregistree');openCoursDetail(curCoursId);
}
function delSeance(){
  if(editSeaIdx===null) return;
  var d=load();var cours=d.cours.find(function(x){return x.id===curCoursId;});
  if(!cours||!confirm('Supprimer cette seance ?')) return;
  cours.seances.splice(editSeaIdx,1);
  save(d);hide('m-sea');toast('Seance supprimee');openCoursDetail(curCoursId);
}

// ─── UTILS ───────────────────────────────────────────────────
function lighten(hex,a){try{var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.min(255,Math.round(r+(255-r)*a));g=Math.min(255,Math.round(g+(255-g)*a));b=Math.min(255,Math.round(b+(255-b)*a));return '#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0');}catch(e){return hex;}}
function today(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtDate(s){try{return new Date(s+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});}catch(e){return s||'';}}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function stLabel(s){return s==='pause'?'En pause':s==='termine'?'Termine':'En cours';}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}

window.addEventListener('load',function(){
  document.getElementById('ee-date').value=today();
  document.getElementById('ss-date').value=today();
  initCanvas();
  window.addEventListener('message',function(e){
    if(e.data&&e.data.type==='reload-univers'){draw();if(curView==='texte')renderTexte();}
  });
});
</script>
