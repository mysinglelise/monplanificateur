<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Journal de Rêves</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#07080f;color:#e8e9f0;font-family:system-ui,sans-serif;height:100vh;overflow:hidden;}

header{position:fixed;top:0;left:0;right:0;z-index:200;height:48px;background:rgba(7,8,15,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding:0 16px;gap:8px;}
.nav-btn{padding:4px 13px;border-radius:14px;border:none;background:none;color:#6b7089;font-size:12px;cursor:pointer;font-family:system-ui;transition:all .18s;}
.nav-btn.on{background:rgba(255,255,255,0.08);color:#e8e9f0;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.search-wrap{position:relative;}
.search-wrap input{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:5px 28px 5px 30px;color:#e8e9f0;font-size:12px;font-family:system-ui;outline:none;width:160px;transition:all .2s;}
.search-wrap input:focus{width:220px;border-color:rgba(255,255,255,0.2);}
.s-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;color:#6b7089;pointer-events:none;}
.s-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:14px;color:#6b7089;cursor:pointer;display:none;}

#main{position:fixed;inset:0;top:48px;overflow-y:auto;padding:20px 20px 80px;}
.inner{max-width:740px;margin:0 auto;}

/* RAPPEL MAINS */
.mains-card{background:linear-gradient(135deg,rgba(99,52,140,0.18),rgba(49,25,80,0.22));border:1px solid rgba(139,92,246,0.25);border-radius:14px;padding:16px 18px;margin-bottom:20px;}
.mains-titre{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#a78bfa;margin-bottom:6px;display:flex;align-items:center;gap:7px;}
.mains-sub{font-size:11px;color:#6b7089;margin-bottom:12px;}
.mains-grid{display:flex;gap:6px;flex-wrap:wrap;}
.main-btn{font-size:22px;cursor:pointer;filter:grayscale(1);opacity:.35;transition:all .2s;border:none;background:none;padding:2px;}
.main-btn.done{filter:grayscale(0);opacity:1;transform:scale(1.08);}
.mains-reset{font-size:10px;color:#6b7089;cursor:pointer;text-decoration:underline;margin-top:8px;display:inline-block;background:none;border:none;font-family:system-ui;}

/* BOUTON NOUVEAU RÊVE */
.new-btn{width:100%;padding:13px;background:linear-gradient(135deg,rgba(99,52,140,0.2),rgba(59,130,246,0.1));border:1px dashed rgba(139,92,246,0.35);border-radius:12px;color:#a78bfa;font-size:14px;cursor:pointer;font-family:system-ui;transition:all .2s;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:8px;}
.new-btn:hover{background:linear-gradient(135deg,rgba(99,52,140,0.32),rgba(59,130,246,0.18));border-color:rgba(139,92,246,0.6);}

/* CALENDRIER ANNUEL */
.cal-year-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-nav{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#e8e9f0;padding:5px 14px;border-radius:8px;cursor:pointer;font-size:15px;}
.cal-nav:hover{background:rgba(255,255,255,0.12);}
.cal-year-label{font-size:17px;font-weight:700;color:#e8e9f0;}
.cal-year-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
@media(max-width:600px){.cal-year-grid{grid-template-columns:repeat(2,1fr);gap:10px;}}
.cal-month-block{background:#0c0d1a;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:10px;}
.cal-month-name{font-size:11px;font-weight:700;color:#a78bfa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.cal-month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.cal-dow{text-align:center;font-size:8px;color:#4b5270;font-weight:700;padding:2px 0;}
.cal-day{text-align:center;font-size:9px;font-weight:500;color:#6b7089;padding:2px 1px;border-radius:3px;cursor:pointer;line-height:1.4;position:relative;}
.cal-day:hover{background:rgba(139,92,246,0.2);}
.cal-day.other-month{color:#1e2035;}
.cal-day.today{color:#a78bfa;font-weight:800;}
.cal-day.has-reve{color:#0a0b14;font-weight:700;}
.cal-day.lucide{background:linear-gradient(135deg,#fbbf24,#f59e0b) !important;}
.cal-stats{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.cal-stat{background:#0c0d1a;border:1px solid rgba(255,255,255,0.07);border-radius:9px;padding:10px 16px;text-align:center;}
.cal-stat-num{font-size:20px;font-weight:700;}
.cal-stat-label{font-size:10px;color:#6b7089;text-transform:uppercase;letter-spacing:.07em;}
.cal-legend{display:flex;align-items:center;gap:6px;margin-top:12px;flex-wrap:wrap;}
.cal-legend span{font-size:10px;color:#6b7089;}
.leg-cell{width:11px;height:11px;border-radius:2px;display:inline-block;}

/* LISTE RÊVES */
.reve-card{background:#0c0d1a;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;}
.reve-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.reve-card:hover{border-color:rgba(255,255,255,0.14);transform:translateY(-1px);}
.reve-top{display:flex;align-items:center;gap:9px;margin-bottom:6px;}
.reve-date{font-size:11px;color:#6b7089;}
.reve-lucide-badge{font-size:10px;padding:2px 8px;border-radius:8px;background:linear-gradient(90deg,rgba(250,204,21,0.2),rgba(251,146,60,0.2));border:1px solid rgba(250,204,21,0.35);color:#fbbf24;font-weight:600;}
.reve-titre{font-size:14px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.reve-extrait{font-size:12px;color:#8890aa;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.reve-tags{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;}
.reve-tag{font-size:10px;padding:2px 8px;border-radius:8px;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.2);color:#a78bfa;}
.highlight{background:rgba(250,204,21,0.3);border-radius:2px;padding:0 1px;}

/* Couleurs par agrément */
.agr-5{background:rgba(196,181,253,0.08);}
.agr-5::before{background:#c4b5fd;}
.agr-4{background:rgba(147,197,253,0.08);}
.agr-4::before{background:#93c5fd;}
.agr-3::before{background:#6b7089;}
.agr-2{background:rgba(100,116,139,0.06);}
.agr-2::before{background:#64748b;}
.agr-1{background:rgba(248,113,113,0.07);}
.agr-1::before{background:#374151;}
.agr-lucide{background:rgba(251,191,36,0.09);}
.agr-lucide::before{background:linear-gradient(180deg,#fbbf24,#f59e0b) !important;}

/* VIDE */
.empty{text-align:center;padding:48px 20px;color:#4b5270;}
.empty-ico{font-size:40px;margin-bottom:10px;}

/* OVERLAY SAISIE */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:400;display:flex;align-items:flex-end;justify-content:center;padding:0;}
@media(min-width:600px){.overlay{align-items:center;padding:20px;}}
.modal{background:#0e0f1e;border:1px solid rgba(255,255,255,0.1);border-radius:16px 16px 0 0;padding:22px 20px 32px;width:100%;max-width:540px;max-height:94vh;overflow-y:auto;}
@media(min-width:600px){.modal{border-radius:16px;}}
.modal-titre{font-size:16px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:10px;color:#9ca3af;margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em;}
.fg input,.fg textarea,.fg select{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:9px 12px;color:#e8e9f0;font-size:13px;font-family:system-ui;outline:none;transition:border-color .18s;}
.fg input:focus,.fg textarea:focus{border-color:rgba(139,92,246,0.5);}
.fg textarea{resize:vertical;min-height:100px;line-height:1.6;}
.fg select option{background:#0e0f1e;}
.agr-picker{display:flex;gap:8px;flex-wrap:wrap;}
.agr-opt{padding:7px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);cursor:pointer;font-size:12px;transition:all .18s;color:#9ca3af;}
.agr-opt.sel{border-color:var(--ac);background:var(--abg);color:var(--ac);}
.lucide-toggle{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:1px solid rgba(250,204,21,0.2);background:rgba(250,204,21,0.04);cursor:pointer;transition:all .18s;margin-bottom:14px;}
.lucide-toggle.on{border-color:rgba(250,204,21,0.5);background:rgba(250,204,21,0.1);}
.lucide-toggle-dot{width:18px;height:18px;border-radius:50%;border:2px solid rgba(250,204,21,0.4);transition:all .18s;}
.lucide-toggle.on .lucide-toggle-dot{background:#fbbf24;border-color:#fbbf24;}
.lucide-toggle-label{font-size:13px;color:#9ca3af;}
.lucide-toggle.on .lucide-toggle-label{color:#fbbf24;}
.actions{display:flex;gap:8px;margin-top:18px;}
.bok{flex:1;padding:10px;background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#a78bfa;font-size:13px;cursor:pointer;font-family:system-ui;transition:all .18s;}
.bok:hover{background:rgba(139,92,246,0.25);}
.bcan{padding:10px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#9ca3af;font-size:13px;cursor:pointer;font-family:system-ui;}
.bdel{padding:10px 14px;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:8px;color:#f87171;font-size:13px;cursor:pointer;font-family:system-ui;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e1f30;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 20px;font-size:13px;color:#e8e9f0;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}

/* DETAIL REVE */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:410;display:flex;align-items:center;justify-content:center;padding:20px;}
.detail-modal{background:#0e0f1e;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;}
.detail-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;}
.detail-titre{font-size:18px;font-weight:600;flex:1;line-height:1.4;}
.detail-meta{font-size:11px;color:#6b7089;margin-bottom:14px;display:flex;gap:10px;flex-wrap:wrap;}
.detail-texte{font-size:14px;color:#c8cad8;line-height:1.75;white-space:pre-wrap;}
.detail-actions{display:flex;gap:8px;margin-top:20px;}
</style>
</head>
<body>

<header>
  <button class="nav-btn on" id="btn-journal" onclick="showTab('journal')">🌙 Journal</button>
  <button class="nav-btn" id="btn-heatmap" onclick="showTab('heatmap')">🗓️ Année</button>
  <div class="hdr-right">
    <div class="search-wrap">
      <span class="s-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Rechercher..." oninput="onSearch(this.value)">
      <span class="s-clear" id="s-clear" onclick="clearSearch()">×</span>
    </div>
  </div>
</header>

<div id="main">
  <div class="inner">

    <!-- RAPPEL MAINS -->
    <div class="mains-card" id="mains-card">
      <div class="mains-titre">🖐️ Rappel Rêve Lucide</div>
      <div class="mains-sub">Regarde tes mains dans la journée — entraîne-toi à faire un test de réalité</div>
      <div class="mains-grid" id="mains-grid"></div>
      <button class="mains-reset" onclick="resetMains()">remettre à zéro</button>
    </div>

    <!-- BOUTON NOUVEAU RÊVE -->
    <button class="new-btn" onclick="openNew()">
      ✦ Noter un rêve
    </button>

    <!-- CONTENU ONGLET -->
    <div id="tab-journal"></div>
    <div id="tab-heatmap" style="display:none;">
      <div id="cal-stats" class="cal-stats"></div>
      <div class="cal-year-header">
        <button class="cal-nav" onclick="changeYear(-1)">←</button>
        <span class="cal-year-label" id="cal-year-label"></span>
        <button class="cal-nav" onclick="changeYear(1)">→</button>
      </div>
      <div class="cal-year-grid" id="cal-year-grid"></div>
      <div class="cal-legend">
        <div class="leg-cell" style="background:#1e293b;"></div><span>Cauchemar</span>
        <div class="leg-cell" style="background:#475569;"></div><span>Désagréable</span>
        <div class="leg-cell" style="background:#94a3b8;"></div><span>Neutre</span>
        <div class="leg-cell" style="background:#93c5fd;"></div><span>Agréable</span>
        <div class="leg-cell" style="background:#c4b5fd;"></div><span>Très agréable</span>
        <div class="leg-cell" style="background:linear-gradient(135deg,#fbbf24,#f59e0b);"></div><span>Lucide ✨</span>
      </div>
    </div>

  </div>
</div>

<!-- OVERLAY SAISIE -->
<div class="overlay" id="overlay-saisie" style="display:none;" onclick="closeIfBg(event,'overlay-saisie')">
  <div class="modal">
    <div class="modal-titre" id="modal-titre">✦ Nouveau rêve</div>

    <div class="fg">
      <label>Titre (optionnel)</label>
      <input type="text" id="f-titre" placeholder="Un titre pour ce rêve…">
    </div>

    <div class="fg">
      <label>Date du rêve</label>
      <input type="date" id="f-date">
    </div>

    <div class="fg">
      <label>Récit du rêve</label>
      <textarea id="f-texte" rows="6" placeholder="Décris ton rêve avec le plus de détails possible…"></textarea>
    </div>

    <div class="fg">
      <label>Agréabilité</label>
      <div class="agr-picker" id="agr-picker">
        <div class="agr-opt" data-v="5" style="--ac:#c4b5fd;--abg:rgba(196,181,253,0.12);" onclick="pickAgr(5)">✨ Très agréable</div>
        <div class="agr-opt" data-v="4" style="--ac:#93c5fd;--abg:rgba(147,197,253,0.12);" onclick="pickAgr(4)">😊 Agréable</div>
        <div class="agr-opt" data-v="3" style="--ac:#94a3b8;--abg:rgba(148,163,184,0.12);" onclick="pickAgr(3)">😐 Neutre</div>
        <div class="agr-opt" data-v="2" style="--ac:#64748b;--abg:rgba(100,116,139,0.12);" onclick="pickAgr(2)">😟 Désagréable</div>
        <div class="agr-opt" data-v="1" style="--ac:#475569;--abg:rgba(71,85,105,0.12);" onclick="pickAgr(1)">😰 Cauchemar</div>
      </div>
    </div>

    <div class="lucide-toggle" id="lucide-toggle" onclick="toggleLucide()">
      <div class="lucide-toggle-dot"></div>
      <div class="lucide-toggle-label">🌟 Rêve lucide (j'étais conscient de rêver)</div>
    </div>

    <div class="fg">
      <label>Mots-clés / Tags (séparés par des virgules)</label>
      <input type="text" id="f-tags" placeholder="ex: voler, eau, famille…">
    </div>

    <div class="actions">
      <button class="bcan" onclick="closeSaisie()">Annuler</button>
      <button class="bdel" id="btn-del" style="display:none;" onclick="deleteReve()">Supprimer</button>
      <button class="bok" onclick="saveReve()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- OVERLAY DETAIL -->
<div class="detail-overlay" id="overlay-detail" style="display:none;" onclick="closeIfBg(event,'overlay-detail')">
  <div class="detail-modal" id="detail-modal">
    <div class="detail-header">
      <div class="detail-titre" id="d-titre"></div>
    </div>
    <div class="detail-meta" id="d-meta"></div>
    <div class="detail-texte" id="d-texte"></div>
    <div class="detail-actions">
      <button class="bcan" onclick="closeDetail()">Fermer</button>
      <button class="bok" onclick="editFromDetail()">✏️ Modifier</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── DONNÉES ──────────────────────────────────────────────────
function load() {
  try { return JSON.parse(localStorage.getItem('revesData') || '[]'); } catch(e) { return []; }
}
function save(data) {
  localStorage.setItem('revesData', JSON.stringify(data));
  window.parent && window.parent.postMessage({type:'reves-updated'}, '*');
}

function loadMains() {
  var today = dateToStr(new Date());
  try {
    var m = JSON.parse(localStorage.getItem('revesMains') || '{}');
    if (m.date !== today) return { date: today, count: 0 };
    return m;
  } catch(e) { return { date: today, count: 0 }; }
}
function saveMains(m) { localStorage.setItem('revesMains', JSON.stringify(m)); }

function dateToStr(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

// ─── ÉTAT ─────────────────────────────────────────────────────
var curTab = 'journal';
var editId = null;
var selAgr = 3;
var isLucide = false;
var searchQ = '';
var detailId = null;

// ─── ONGLETS ──────────────────────────────────────────────────
function showTab(tab) {
  curTab = tab;
  document.getElementById('btn-journal').className = 'nav-btn' + (tab==='journal'?' on':'');
  document.getElementById('btn-heatmap').className = 'nav-btn' + (tab==='heatmap'?' on':'');
  document.getElementById('tab-journal').style.display = tab==='journal' ? '' : 'none';
  document.getElementById('tab-heatmap').style.display = tab==='heatmap' ? '' : 'none';
  if (tab==='journal') renderJournal();
  else renderCalendar();
}

// ─── MAINS ────────────────────────────────────────────────────
function renderMains() {
  var m = loadMains();
  var grid = document.getElementById('mains-grid');
  var html = '';
  for (var i = 1; i <= 10; i++) {
    html += '<button class="main-btn' + (i <= m.count ? ' done' : '') + '" onclick="clickMain(' + i + ')" title="Main ' + i + '">🤚</button>';
  }
  grid.innerHTML = html;
}

function clickMain(n) {
  var m = loadMains();
  m.count = (m.count === n) ? n - 1 : n;
  saveMains(m);
  renderMains();
  if (m.count === 10) toast('✨ 10 tests de réalité aujourd\'hui — bravo !');
}

function resetMains() {
  var m = loadMains();
  m.count = 0;
  saveMains(m);
  renderMains();
}

// ─── JOURNAL ──────────────────────────────────────────────────
function renderJournal() {
  var data = load();
  var q = searchQ.toLowerCase();
  if (q) {
    data = data.filter(function(r) {
      return (r.titre||'').toLowerCase().includes(q) ||
             (r.texte||'').toLowerCase().includes(q) ||
             (r.tags||[]).some(function(t){ return t.toLowerCase().includes(q); });
    });
  }
  // tri : plus récent en premier
  data = data.slice().sort(function(a,b){ return b.date.localeCompare(a.date); });

  var el = document.getElementById('tab-journal');
  if (!data.length) {
    el.innerHTML = '<div class="empty"><div class="empty-ico">' + (q ? '🔍' : '🌙') + '</div>' +
      (q ? 'Aucun rêve ne correspond à "' + esc(searchQ) + '"' : 'Aucun rêve noté pour l\'instant.<br><span style="font-size:12px;margin-top:6px;display:block;">La prochaine fois que tu te réveilles, note tout !</span>') + '</div>';
    return;
  }

  var html = '';
  if (q) html += '<div style="font-size:11px;color:#6b7089;margin-bottom:12px;">' + data.length + ' rêve(s) trouvé(s)</div>';

  data.forEach(function(r) {
    var agrClass = r.lucide ? 'agr-lucide' : ('agr-' + (r.agr||3));
    var titre = r.titre || formatDate(r.date);
    var tags = (r.tags||[]).map(function(t){ return '<span class="reve-tag">' + esc(t) + '</span>'; }).join('');
    var extrait = (r.texte||'').slice(0, 140) + ((r.texte||'').length > 140 ? '…' : '');
    if (q) {
      titre = highlightQ(titre, q);
      extrait = highlightQ(extrait, q);
    }
    html += '<div class="reve-card ' + agrClass + '" onclick="openDetail(\'' + r.id + '\')">' +
      '<div class="reve-top">' +
        '<span class="reve-date">' + formatDate(r.date) + '</span>' +
        (r.lucide ? '<span class="reve-lucide-badge">🌟 Lucide</span>' : '') +
        '<span class="reve-titre">' + titre + '</span>' +
      '</div>' +
      '<div class="reve-extrait">' + extrait + '</div>' +
      (tags ? '<div class="reve-tags">' + tags + '</div>' : '') +
      '</div>';
  });
  el.innerHTML = html;
}

function highlightQ(text, q) {
  if (!q || !text) return esc(text||'');
  var escaped = esc(text);
  var re = new RegExp('(' + esc(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return escaped.replace(re, '<span class="highlight">$1</span>');
}

// ─── CALENDRIER ANNUEL ────────────────────────────────────────
var calYear = new Date().getFullYear();

function changeYear(delta) { calYear += delta; renderCalendar(); }

function renderCalendar() {
  var data = load(), byDate = {};
  data.forEach(function(r){ byDate[r.date] = r; });
  var today = dateToStr(new Date());

  document.getElementById('cal-year-label').textContent = calYear;

  var MOIS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  var JOURS = ['L','M','M','J','V','S','D'];
  var COLS = {1:'#1e293b',2:'#475569',3:'#94a3b8',4:'#93c5fd',5:'#c4b5fd'};

  // Stats annuelles
  var yd = data.filter(function(r){ return r.date.startsWith(''+calYear); });
  var lucides = yd.filter(function(r){ return r.lucide; }).length;
  document.getElementById('cal-stats').innerHTML =
    '<div class="cal-stat"><div class="cal-stat-num" style="color:#a78bfa;">' + yd.length + '</div><div class="cal-stat-label">rêves ' + calYear + '</div></div>' +
    '<div class="cal-stat"><div class="cal-stat-num" style="color:#fbbf24;">' + lucides + '</div><div class="cal-stat-label">lucides</div></div>';

  var html = '';
  for (var m = 0; m < 12; m++) {
    html += '<div class="cal-month-block"><div class="cal-month-name">' + MOIS[m] + '</div>';
    html += '<div class="cal-month-grid">';
    // En-têtes
    JOURS.forEach(function(j){ html += '<div class="cal-dow">'+j+'</div>'; });

    // Décalage du premier jour (lundi=0)
    var firstDay = new Date(calYear, m, 1);
    var offset = (firstDay.getDay() === 0) ? 6 : firstDay.getDay() - 1;
    for (var i = 0; i < offset; i++) html += '<div></div>';

    // Jours du mois
    var daysInMonth = new Date(calYear, m+1, 0).getDate();
    for (var d = 1; d <= daysInMonth; d++) {
      var ds = dateToStr(new Date(calYear, m, d));
      var r = byDate[ds];
      var cls = 'cal-day';
      var style = '';
      var title = '';
      if (ds === today) cls += ' today';
      if (r) {
        cls += ' has-reve';
        if (r.lucide) {
          cls += ' lucide';
          title = '🌟 ' + (r.titre || 'Lucide');
        } else {
          style = 'background:' + (COLS[r.agr||3]||'#94a3b8') + ';';
          title = r.titre || agrLabel(r.agr);
        }
      }
      var onclick = r ? 'openDetail(\'' + r.id + '\')' : 'openNewDate(\'' + ds + '\')';
      html += '<div class="' + cls + '" style="' + style + '" title="' + esc(title) + '" onclick="' + onclick + '">' + d + '</div>';
    }
    html += '</div></div>';
  }
  document.getElementById('cal-year-grid').innerHTML = html;
}

// ─── SAISIE ───────────────────────────────────────────────────
function openNew() {
  editId = null;
  selAgr = 3;
  isLucide = false;
  document.getElementById('f-titre').value = '';
  document.getElementById('f-date').value = dateToStr(new Date());
  document.getElementById('f-texte').value = '';
  document.getElementById('f-tags').value = '';
  document.getElementById('modal-titre').innerHTML = '✦ Nouveau rêve';
  document.getElementById('btn-del').style.display = 'none';
  syncAgrUI();
  syncLucideUI();
  document.getElementById('overlay-saisie').style.display = 'flex';
  setTimeout(function(){ document.getElementById('f-texte').focus(); }, 80);
}

function openNewDate(date) {
  openNew();
  document.getElementById('f-date').value = date;
}

function openEdit(id) {
  var data = load();
  var r = data.find(function(x){ return x.id === id; });
  if (!r) return;
  editId = id;
  selAgr = r.agr || 3;
  isLucide = r.lucide || false;
  document.getElementById('f-titre').value = r.titre || '';
  document.getElementById('f-date').value = r.date;
  document.getElementById('f-texte').value = r.texte || '';
  document.getElementById('f-tags').value = (r.tags||[]).join(', ');
  document.getElementById('modal-titre').innerHTML = '✏️ Modifier le rêve';
  document.getElementById('btn-del').style.display = '';
  syncAgrUI();
  syncLucideUI();
  document.getElementById('overlay-detail').style.display = 'none';
  document.getElementById('overlay-saisie').style.display = 'flex';
}

function closeSaisie() {
  document.getElementById('overlay-saisie').style.display = 'none';
}

function pickAgr(v) {
  selAgr = v;
  syncAgrUI();
}

function syncAgrUI() {
  document.querySelectorAll('.agr-opt').forEach(function(el) {
    el.classList.toggle('sel', parseInt(el.dataset.v) === selAgr);
  });
}

function toggleLucide() {
  isLucide = !isLucide;
  syncLucideUI();
}

function syncLucideUI() {
  document.getElementById('lucide-toggle').classList.toggle('on', isLucide);
}

function saveReve() {
  var titre = document.getElementById('f-titre').value.trim();
  var date = document.getElementById('f-date').value;
  var texte = document.getElementById('f-texte').value.trim();
  var tagsRaw = document.getElementById('f-tags').value.trim();
  if (!date) { toast('Date obligatoire'); return; }
  if (!texte) { toast('Décris ton rêve !'); return; }

  var tags = tagsRaw ? tagsRaw.split(',').map(function(t){ return t.trim(); }).filter(Boolean) : [];
  var data = load();
  if (editId) {
    var r = data.find(function(x){ return x.id === editId; });
    if (r) { r.titre=titre; r.date=date; r.texte=texte; r.agr=selAgr; r.lucide=isLucide; r.tags=tags; r.ts=Date.now(); }
  } else {
    data.push({ id: 'r'+Date.now(), titre:titre, date:date, texte:texte, agr:selAgr, lucide:isLucide, tags:tags, ts:Date.now() });
  }
  save(data);
  closeSaisie();
  toast(isLucide ? '🌟 Rêve lucide enregistré !' : '🌙 Rêve enregistré');
  if (curTab === 'journal') renderJournal();
  else renderCalendar();
}

function deleteReve() {
  if (!editId) return;
  var data = load();
  var r = data.find(function(x){ return x.id === editId; });
  if (!r || !confirm('Supprimer ce rêve ?')) return;
  data = data.filter(function(x){ return x.id !== editId; });
  save(data);
  closeSaisie();
  toast('Rêve supprimé');
  if (curTab === 'journal') renderJournal();
  else renderCalendar();
}

// ─── DÉTAIL ───────────────────────────────────────────────────
function openDetail(id) {
  var data = load();
  var r = data.find(function(x){ return x.id === id; });
  if (!r) return;
  detailId = id;

  var titre = r.titre || formatDate(r.date);
  var lucideBadge = r.lucide ? ' <span style="font-size:12px;padding:2px 9px;border-radius:8px;background:rgba(251,191,36,0.15);border:1px solid rgba(251,191,36,0.35);color:#fbbf24;vertical-align:middle;">🌟 Lucide</span>' : '';
  document.getElementById('d-titre').innerHTML = esc(titre) + lucideBadge;

  var metaParts = [formatDate(r.date), agrLabel(r.agr)];
  if ((r.tags||[]).length) metaParts.push(r.tags.map(function(t){ return '#'+t; }).join(' '));
  document.getElementById('d-meta').innerHTML = metaParts.map(function(p){ return '<span>'+esc(p)+'</span>'; }).join('');

  var texte = r.texte || '';
  var q = searchQ.toLowerCase();
  document.getElementById('d-texte').innerHTML = q ? highlightQ(texte, q) : esc(texte);
  document.getElementById('overlay-detail').style.display = 'flex';
}

function closeDetail() {
  document.getElementById('overlay-detail').style.display = 'none';
}

function editFromDetail() {
  if (detailId) openEdit(detailId);
}

// ─── RECHERCHE ────────────────────────────────────────────────
function onSearch(v) {
  searchQ = v;
  document.getElementById('s-clear').style.display = v ? 'block' : 'none';
  if (curTab === 'journal') renderJournal();
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  onSearch('');
}

// ─── HELPERS ──────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(ds) {
  if (!ds) return '';
  var parts = ds.split('-');
  var MOIS = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  return parseInt(parts[2]) + ' ' + MOIS[parseInt(parts[1])-1] + ' ' + parts[0];
}

function agrLabel(v) {
  var labels = {1:'😰 Cauchemar',2:'😟 Désagréable',3:'😐 Neutre',4:'😊 Agréable',5:'✨ Très agréable'};
  return labels[v] || 'Neutre';
}

function closeIfBg(e, id) {
  if (e.target.id === id) {
    if (id === 'overlay-saisie') closeSaisie();
    if (id === 'overlay-detail') closeDetail();
  }
}

function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2200);
}

// ─── INIT ─────────────────────────────────────────────────────
renderMains();
showTab('journal');

// Réinitialiser les mains chaque nouveau jour
setInterval(function(){
  var m = loadMains();
  var today = dateToStr(new Date());
  if (m.date !== today) renderMains();
}, 60000);

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'reload-reves') {
    renderJournal();
  }
});
</script>
